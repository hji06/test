<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f766e">
  <title>카탈레이스 효소 반응 속도 탐구</title>

  <style>
    :root {
      --bg:#f4f7fb;
      --card:#fff;
      --text:#172033;
      --muted:#667085;
      --line:#dfe6ef;
      --primary:#0f766e;
      --primary-dark:#115e59;
      --soft:#e7f7f4;
      --blue:#3156d3;
      --blue-soft:#eef2ff;
      --amber:#8a4b00;
      --amber-soft:#fff7e6;
      --red:#b42318;
      --red-soft:#fff0ee;
      --green:#067647;
      --green-soft:#ecfdf3;
      --shadow:0 10px 30px rgba(28,39,60,.08);
      --radius:22px;
    }

    * {
      box-sizing:border-box;
    }

    html {
      -webkit-text-size-adjust:100%;
    }

    body {
      margin:0;
      min-height:100vh;
      background:var(--bg);
      color:var(--text);
      font-family:
        "Pretendard",
        "Noto Sans KR",
        system-ui,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;
      line-height:1.55;
    }

    button,
    input,
    select,
    textarea {
      font:inherit;
    }

    button {
      touch-action:manipulation;
    }

    .hidden {
      display:none !important;
    }

    .app {
      width:min(1120px, calc(100% - 28px));
      margin:0 auto;
      padding:18px 0 48px;
    }

    .card {
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
    }

    .topbar {
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:18px;
      padding:20px 22px;
      margin-bottom:16px;
    }

    .brand {
      display:flex;
      align-items:center;
      gap:14px;
      min-width:0;
    }

    .brand-icon {
      width:58px;
      height:58px;
      flex:0 0 58px;
      display:grid;
      place-items:center;
      border-radius:17px;
      background:linear-gradient(135deg,#dff7f3,#eef2ff);
      font-size:30px;
    }

    .brand h1 {
      margin:0;
      font-size:clamp(21px,3vw,29px);
      letter-spacing:-.03em;
    }

    .brand p {
      margin:2px 0 0;
      color:var(--muted);
      font-size:14px;
    }

    .top-actions {
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .sync-badge {
      display:inline-flex;
      align-items:center;
      gap:7px;
      min-height:38px;
      padding:8px 11px;
      border-radius:999px;
      border:1px solid var(--line);
      background:#fff;
      color:var(--muted);
      font-size:13px;
      font-weight:800;
    }

    .sync-dot {
      width:9px;
      height:9px;
      border-radius:50%;
      background:#98a2b3;
    }

    .sync-badge.online .sync-dot {
      background:#12b76a;
    }

    .sync-badge.saving .sync-dot {
      background:#f79009;
      animation:pulse 1s infinite;
    }

    .sync-badge.offline .sync-dot {
      background:#f04438;
    }

    @keyframes pulse {
      50% {
        opacity:.35;
      }
    }

    .btn {
      min-height:48px;
      border:0;
      border-radius:14px;
      padding:11px 16px;
      cursor:pointer;
      font-weight:850;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      transition:transform .12s ease, background .12s ease;
    }

    .btn:active {
      transform:translateY(1px);
    }

    .btn:disabled {
      opacity:.45;
      cursor:not-allowed;
    }

    .btn-primary {
      color:#fff;
      background:var(--primary);
      box-shadow:0 8px 18px rgba(15,118,110,.2);
    }

    .btn-primary:hover {
      background:var(--primary-dark);
    }

    .btn-soft {
      color:#344054;
      background:#f2f4f7;
      border:1px solid #e4e7ec;
    }

    .btn-danger {
      color:var(--red);
      background:var(--red-soft);
      border:1px solid #ffd5d0;
    }

    .btn-small {
      min-height:38px;
      padding:8px 12px;
      border-radius:11px;
      font-size:13px;
    }

    .stepper {
      padding:14px 16px;
      margin-bottom:16px;
      overflow-x:auto;
    }

    .step-track {
      display:grid;
      grid-template-columns:repeat(6,minmax(110px,1fr));
      min-width:720px;
      gap:8px;
    }

    .step-item {
      display:flex;
      align-items:center;
      gap:8px;
      padding:8px 9px;
      border-radius:13px;
      color:#98a2b3;
      font-size:13px;
      font-weight:850;
    }

    .step-num {
      width:30px;
      height:30px;
      border-radius:50%;
      display:grid;
      place-items:center;
      background:#f2f4f7;
      flex:0 0 30px;
    }

    .step-item.active {
      color:var(--primary-dark);
      background:var(--soft);
    }

    .step-item.active .step-num {
      color:#fff;
      background:var(--primary);
    }

    .step-item.done {
      color:#344054;
    }

    .step-item.done .step-num {
      color:var(--green);
      background:var(--green-soft);
    }

    .main-card {
      min-height:520px;
      padding:clamp(20px,3vw,34px);
    }

    .page-head {
      display:flex;
      align-items:flex-start;
      gap:13px;
      margin-bottom:22px;
    }

    .page-icon {
      width:44px;
      height:44px;
      border-radius:14px;
      background:var(--soft);
      display:grid;
      place-items:center;
      font-size:22px;
      flex:0 0 44px;
    }

    .page-head h2 {
      margin:0;
      font-size:clamp(21px,3vw,27px);
      letter-spacing:-.02em;
    }

    .page-head p {
      margin:4px 0 0;
      color:var(--muted);
    }

    .grid-2 {
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:16px;
    }

    .grid-3 {
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:14px;
    }

    .field {
      margin-bottom:16px;
    }

    .field label {
      display:block;
      margin-bottom:7px;
      font-size:14px;
      font-weight:850;
      color:#344054;
    }

    .required::after {
      content:" *";
      color:var(--red);
    }

    .input,
    .select,
    .textarea {
      width:100%;
      min-height:52px;
      border:1.5px solid #cfd8e5;
      border-radius:14px;
      background:#fff;
      color:var(--text);
      padding:12px 14px;
      outline:none;
      font-size:16px;
    }

    .textarea {
      min-height:122px;
      resize:vertical;
    }

    .input:focus,
    .select:focus,
    .textarea:focus {
      border-color:var(--primary);
      box-shadow:0 0 0 4px rgba(15,118,110,.12);
    }

    .notice {
      border-radius:16px;
      padding:14px 16px;
      margin:14px 0;
      font-size:14px;
    }

    .notice.info {
      background:var(--blue-soft);
      color:#3043a7;
      border:1px solid #d9e0ff;
    }

    .notice.warn {
      background:var(--amber-soft);
      color:#7a4600;
      border:1px solid #f5dba8;
    }

    .notice.good {
      background:var(--green-soft);
      color:#05603a;
      border:1px solid #b7ebce;
    }

    .notice.bad {
      background:var(--red-soft);
      color:#912018;
      border:1px solid #ffd2cc;
    }

    .mini-card {
      border:1px solid var(--line);
      border-radius:17px;
      padding:16px;
      background:#fff;
    }

    .mini-card h3 {
      margin:0 0 12px;
      font-size:17px;
    }

    .subtle {
      color:var(--muted);
      font-size:14px;
    }

    .choice-grid {
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:12px;
    }

    .choice {
      position:relative;
      min-height:66px;
      padding:14px 15px;
      border:2px solid #e4e7ec;
      border-radius:16px;
      background:#fff;
      cursor:pointer;
      display:flex;
      gap:11px;
      align-items:center;
    }

    .choice input {
      width:22px;
      height:22px;
      accent-color:var(--primary);
      flex:0 0 22px;
    }

    .choice:has(input:checked) {
      border-color:var(--primary);
      background:var(--soft);
    }

    .choice strong {
      display:block;
      font-size:15px;
    }

    .variable-table {
      width:100%;
      border-collapse:separate;
      border-spacing:0;
      border:1px solid var(--line);
      border-radius:16px;
      overflow:hidden;
    }

    .variable-table th,
    .variable-table td {
      padding:12px;
      border-bottom:1px solid var(--line);
      vertical-align:middle;
    }

    .variable-table th {
      background:#f8fafc;
      color:#475467;
      font-size:13px;
      text-align:left;
    }

    .variable-table tr:last-child td {
      border-bottom:0;
    }

    .variable-table .role-cell {
      width:220px;
    }

    .variable-row.invalid {
      background:var(--red-soft);
    }

    .variable-row.invalid .select {
      border-color:#f04438;
    }

    .group-card {
      border:2px solid #e4e7ec;
      border-radius:18px;
      padding:16px;
      background:#fff;
    }

    .group-card.acid {
      border-top-color:#f97066;
    }

    .group-card.neutral {
      border-top-color:#12b76a;
    }

    .group-card.base {
      border-top-color:#53b1fd;
    }

    .group-badge {
      display:inline-block;
      border-radius:999px;
      padding:5px 10px;
      font-size:12px;
      font-weight:900;
      margin-bottom:10px;
    }

    .acid .group-badge {
      color:#9c2a22;
      background:#fee4e2;
    }

    .neutral .group-badge {
      color:#05603a;
      background:#d1fadf;
    }

    .base .group-badge {
      color:#175cd3;
      background:#d1e9ff;
    }

    .procedure {
      counter-reset:procedure;
      display:grid;
      gap:10px;
      margin:0;
      padding:0;
      list-style:none;
    }

    .procedure li {
      display:grid;
      grid-template-columns:34px 1fr;
      gap:10px;
      align-items:start;
      padding:12px;
      border-radius:13px;
      background:#f8fafc;
    }

    .procedure li::before {
      counter-increment:procedure;
      content:counter(procedure);
      width:28px;
      height:28px;
      display:grid;
      place-items:center;
      border-radius:50%;
      background:var(--primary);
      color:#fff;
      font-weight:900;
      font-size:13px;
    }

    .table-wrap {
      overflow:auto;
      border:1px solid var(--line);
      border-radius:16px;
    }

    .data-table {
      width:100%;
      border-collapse:collapse;
      min-width:680px;
    }

    .data-table th,
    .data-table td {
      padding:12px;
      border-bottom:1px solid var(--line);
      text-align:center;
    }

    .data-table th {
      background:#f8fafc;
      color:#475467;
      font-size:13px;
    }

    .data-table tr:last-child td {
      border-bottom:0;
    }

    .table-input {
      width:120px;
      min-height:46px;
      border:1.5px solid #cfd8e5;
      border-radius:12px;
      padding:9px 10px;
      font-size:16px;
      text-align:center;
    }

    .rate-output {
      font-weight:900;
      color:var(--primary-dark);
    }

    .chart-wrap {
      border:1px solid var(--line);
      border-radius:17px;
      padding:12px;
      background:#fff;
      overflow:auto;
    }

    .chart-wrap svg {
      display:block;
      width:100%;
      min-width:620px;
      height:auto;
    }

    .chart-legend {
      display:flex;
      justify-content:center;
      gap:18px;
      flex-wrap:wrap;
      color:var(--muted);
      font-size:13px;
    }

    .legend-dot {
      display:inline-block;
      width:10px;
      height:10px;
      border-radius:50%;
      margin-right:6px;
    }

    .footer-nav {
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      border-top:1px solid var(--line);
      padding-top:20px;
      margin-top:24px;
    }

    .footer-nav .right {
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .progress-note {
      color:var(--muted);
      font-size:13px;
    }

    .toast {
      position:fixed;
      left:50%;
      bottom:24px;
      transform:translateX(-50%);
      z-index:1000;
      max-width:min(640px,calc(100% - 28px));
      background:#101828;
      color:#fff;
      border-radius:14px;
      padding:12px 16px;
      font-weight:800;
      box-shadow:0 14px 40px rgba(16,24,40,.25);
      text-align:center;
    }

    .error-boundary {
      text-align:center;
      padding:60px 20px;
    }

    @media(max-width:760px) {
      .topbar {
        align-items:flex-start;
        flex-direction:column;
      }

      .top-actions {
        width:100%;
        justify-content:space-between;
      }

      .grid-2,
      .grid-3,
      .choice-grid {
        grid-template-columns:1fr;
      }

      .main-card {
        padding:18px 15px;
      }

      .variable-table th:first-child,
      .variable-table td:first-child {
        min-width:250px;
      }

      .variable-table .role-cell {
        width:180px;
      }

      .footer-nav {
        align-items:stretch;
        flex-direction:column;
      }

      .footer-nav .right,
      .footer-nav .btn {
        width:100%;
      }

      .brand-icon {
        width:50px;
        height:50px;
        flex-basis:50px;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <header class="card topbar">
      <div class="brand">
        <div class="brand-icon">🧪</div>
        <div>
          <h1>카탈레이스 효소 반응 속도 탐구</h1>
          <p>고등학교 생명과학 실험 활동지</p>
        </div>
      </div>

      <div class="top-actions">
        <div id="syncBadge" class="sync-badge" aria-live="polite">
          <span class="sync-dot"></span>
          <span id="syncText">이 기기에 자동 저장</span>
        </div>

        <button
          class="btn btn-soft btn-small"
          type="button"
          onclick="resetActivity()"
        >
          ↺ 초기화
        </button>
      </div>
    </header>

    <nav class="card stepper" aria-label="활동 단계">
      <div id="stepTrack" class="step-track"></div>
    </nav>

    <main id="mainCard" class="card main-card" tabindex="-1">
      <div class="error-boundary">활동지를 불러오는 중입니다…</div>
    </main>
  </div>

  <div id="toast" class="toast hidden" aria-live="polite"></div>

  <script>
    'use strict';

    const CONFIG = {
      API_URL: 'https://script.google.com/macros/s/AKfycbwPkmzNw_ccqQUK6TdUylqVh5UbddS1P-d-ttujhZqftAvGtP9DaAkLQIPFUdiFXXzM/exec',
      STORAGE_KEY: 'catalase_activity_v6_self_response',
      AUTO_SYNC_DELAY_MS: 900,
      MAX_TIME_SECONDS: 600
    };

    const STEP_NAMES = [
      '시작',
      '가설',
      '실험 설계',
      '결과 기록',
      '해석·그래프',
      '결론·제출'
    ];

    const GROUPS = [
      {
        id:'A',
        label:'산성 조건',
        className:'acid'
      },
      {
        id:'B',
        label:'중성 부근 조건',
        className:'neutral'
      },
      {
        id:'C',
        label:'염기성 조건',
        className:'base'
      }
    ];

    const ROLE_LABELS = {
      independent:'조작 변인',
      controlled:'통제 변인',
      dependent:'종속 변인'
    };

    const VARIABLE_ITEMS = [
      {
        id:'ph',
        label:'용액의 pH',
        correct:'independent'
      },
      {
        id:'riseTime',
        label:'거름종이가 떠오르는 시간',
        correct:'dependent'
      },
      {
        id:'reactionRate',
        label:'카탈레이스의 반응 속도(1/t)',
        correct:'dependent'
      },
      {
        id:'h2o2',
        label:'과산화수소수의 농도와 부피',
        correct:'controlled'
      },
      {
        id:'catalase',
        label:'카탈레이스 용액의 농도',
        correct:'controlled'
      },
      {
        id:'paperSize',
        label:'거름종이 원판의 크기',
        correct:'controlled'
      },
      {
        id:'soakTime',
        label:'거름종이를 카탈레이스 용액에 담그는 시간',
        correct:'controlled'
      },
      {
        id:'temperature',
        label:'반응 용액의 온도',
        correct:'controlled'
      },
      {
        id:'totalVolume',
        label:'반응 용액의 전체 부피',
        correct:'controlled'
      }
    ];

    let state = initialState();
    let syncTimer = null;

    function initialState() {
      return {
        version:6,
        step:1,

        student:{
          studentId:'',
          name:''
        },

        hypothesis:{
          prediction:'',
          reason:''
        },

        design:{
          roles:{},
          targets:{
            A:'',
            B:'',
            C:''
          }
        },

        results:{
          A:{
            actualPh:'',
            time:''
          },
          B:{
            actualPh:'',
            time:''
          },
          C:{
            actualPh:'',
            time:''
          }
        },

        analysis:{
          supported:'',
          evidence:'',
          explanation:'',
          limitation:''
        },

        conclusion:'',
        submitted:false,
        updatedAt:''
      };
    }

    function normalize(raw) {
      const base = initialState();

      if (!raw || typeof raw !== 'object') {
        return base;
      }

      const step = Number(raw.step);

      base.step =
        Number.isInteger(step) && step >= 1 && step <= 6
          ? step
          : 1;

      base.student.studentId =
        String(raw.student?.studentId ?? '');

      base.student.name =
        String(raw.student?.name ?? '');

      base.hypothesis.prediction =
        String(raw.hypothesis?.prediction ?? '');

      base.hypothesis.reason =
        String(raw.hypothesis?.reason ?? '');

      if (
        raw.design?.roles &&
        typeof raw.design.roles === 'object'
      ) {
        for (const item of VARIABLE_ITEMS) {
          const role =
            String(raw.design.roles[item.id] ?? '');

          base.design.roles[item.id] =
            ROLE_LABELS[role] ? role : '';
        }
      }

      for (const group of GROUPS) {
        const target =
          raw.design?.targets?.[group.id];

        base.design.targets[group.id] =
          target === '' || target == null
            ? ''
            : Number(target);

        if (
          !Number.isFinite(
            base.design.targets[group.id]
          )
        ) {
          base.design.targets[group.id] = '';
        }

        const actualPh =
          raw.results?.[group.id]?.actualPh;

        const time =
          raw.results?.[group.id]?.time;

        base.results[group.id].actualPh =
          actualPh === '' || actualPh == null
            ? ''
            : Number(actualPh);

        base.results[group.id].time =
          time === '' || time == null
            ? ''
            : Number(time);

        if (
          !Number.isFinite(
            base.results[group.id].actualPh
          )
        ) {
          base.results[group.id].actualPh = '';
        }

        if (
          !Number.isFinite(
            base.results[group.id].time
          )
        ) {
          base.results[group.id].time = '';
        }
      }

      base.analysis.supported =
        String(raw.analysis?.supported ?? '');

      base.analysis.evidence =
        String(raw.analysis?.evidence ?? '');

      base.analysis.explanation =
        String(raw.analysis?.explanation ?? '');

      base.analysis.limitation =
        String(raw.analysis?.limitation ?? '');

      base.conclusion =
        String(raw.conclusion ?? '');

      base.submitted =
        raw.submitted === true;

      base.updatedAt =
        String(raw.updatedAt ?? '');

      return base;
    }

    function safeText(value) {
      return String(value ?? '')
        .replaceAll('&','&amp;')
        .replaceAll('<','&lt;')
        .replaceAll('>','&gt;')
        .replaceAll('"','&quot;')
        .replaceAll("'",'&#039;');
    }

    function isApiConfigured() {
      return /^https:\/\/script\.google\.com\/macros\/s\/.+\/exec$/
        .test(CONFIG.API_URL.trim());
    }

    function storageGet(key) {
      try {
        return localStorage.getItem(key);
      } catch (error) {
        console.warn('storage read failed',error);
        return null;
      }
    }

    function storageSet(key,value) {
      try {
        localStorage.setItem(key,value);
        return true;
      } catch (error) {
        console.warn('storage write failed',error);
        return false;
      }
    }

    function storageRemove(key) {
      try {
        localStorage.removeItem(key);
      } catch (error) {
        console.warn('storage remove failed',error);
      }
    }

    function loadState() {
      try {
        const saved =
          storageGet(CONFIG.STORAGE_KEY);

        state = saved
          ? normalize(JSON.parse(saved))
          : initialState();

      } catch (error) {
        console.error(error);

        state = initialState();

        storageRemove(CONFIG.STORAGE_KEY);
      }
    }

    function saveLocal() {
      state.updatedAt =
        new Date().toISOString();

      storageSet(
        CONFIG.STORAGE_KEY,
        JSON.stringify(state)
      );

      scheduleSync();
    }

    function hasStudentIdentity() {
      return Boolean(
        state.student.studentId.trim() &&
        state.student.name.trim()
      );
    }

    function studentKey() {
      return state.student.studentId.trim();
    }

    function calculateAll() {
      const result = {};

      for (const group of GROUPS) {
        const ph =
          Number(
            state.results[group.id].actualPh
          );

        const time =
          Number(
            state.results[group.id].time
          );

        result[group.id] = {
          ph:
            Number.isFinite(ph)
              ? ph
              : null,

          time:
            Number.isFinite(time)
              ? time
              : null,

          rate:
            Number.isFinite(time) && time > 0
              ? 1 / time
              : null
        };
      }

      return result;
    }

    function makePayload(finalSubmit) {
      return {
        action:'save',
        finalSubmit:Boolean(finalSubmit),
        studentKey:studentKey(),
        studentId:state.student.studentId.trim(),
        name:state.student.name.trim(),
        currentStep:state.step,
        submitted:state.submitted,
        hypothesis:state.hypothesis,
        design:state.design,
        results:state.results,
        calculated:calculateAll(),
        analysis:state.analysis,
        conclusion:state.conclusion,
        clientUpdatedAt:state.updatedAt
      };
    }

    async function apiPost(payload) {
      const response =
        await fetch(
          CONFIG.API_URL,
          {
            method:'POST',

            headers:{
              'Content-Type':
                'text/plain;charset=utf-8'
            },

            body:JSON.stringify(payload),
            redirect:'follow',
            cache:'no-store'
          }
        );

      if (!response.ok) {
        throw new Error(
          `HTTP ${response.status}`
        );
      }

      const text =
        await response.text();

      let data;

      try {
        data = JSON.parse(text);
      } catch {
        throw new Error(
          '서버 응답을 읽지 못했습니다. Apps Script 배포 설정을 확인하세요.'
        );
      }

      if (!data.ok) {
        throw new Error(
          data.message || '서버 처리 실패'
        );
      }

      return data;
    }

    function scheduleSync() {
      if (!hasStudentIdentity()) {
        setSyncStatus(
          'local',
          '이 기기에 자동 저장'
        );

        return;
      }

      if (!isApiConfigured()) {
        setSyncStatus(
          'local',
          '서버 미연결 · 기기에 저장'
        );

        return;
      }

      clearTimeout(syncTimer);

      setSyncStatus(
        'saving',
        '저장 중…'
      );

      syncTimer =
        setTimeout(
          () => syncToServer(false),
          CONFIG.AUTO_SYNC_DELAY_MS
        );
    }

    async function syncToServer(finalSubmit) {
      if (
        !isApiConfigured() ||
        !hasStudentIdentity()
      ) {
        return {
          ok:false,
          localOnly:true
        };
      }

      try {
        setSyncStatus(
          'saving',
          finalSubmit
            ? '제출 중…'
            : '저장 중…'
        );

        const result =
          await apiPost(
            makePayload(finalSubmit)
          );

        setSyncStatus(
          'online',
          finalSubmit
            ? '제출 완료'
            : '서버 저장 완료'
        );

        return result;

      } catch (error) {
        console.error(error);

        setSyncStatus(
          'offline',
          '서버 연결 실패 · 기기에 저장됨'
        );

        if (finalSubmit) {
          showToast(
            `서버 제출에 실패했습니다. 인터넷 연결 후 다시 눌러 주세요. (${error.message})`,
            5000
          );
        }

        return {
          ok:false,
          error
        };
      }
    }

    function setSyncStatus(type,text) {
      const badge =
        document.getElementById('syncBadge');

      const label =
        document.getElementById('syncText');

      if (!badge || !label) {
        return;
      }

      badge.className =
        'sync-badge' +
        (
          type === 'online'
            ? ' online'
            : type === 'saving'
              ? ' saving'
              : type === 'offline'
                ? ' offline'
                : ''
        );

      label.textContent = text;

      showToast.timer =

          duration

    function saveDesign() {
      const roles = {};

      let missing = 0;
      let wrong = 0;

      for (const item of VARIABLE_ITEMS) {
        const value =
          document
            .getElementById(
              `role-${item.id}`
            )
            .value;

        roles[item.id] = value;

        const row =
          document.getElementById(
            `row-${item.id}`
          );

        row.classList.remove('invalid');

        if (!value) {
          missing += 1;

          row.classList.add('invalid');

        } else if (value !== item.correct) {
          wrong += 1;

          row.classList.add('invalid');
        }
      }

      if (missing) {
        return showToast(
          `분류하지 않은 변인이 ${missing}개 있습니다.`
        );
      }

      if (wrong) {
        return showToast(
          `분류를 다시 확인할 변인이 ${wrong}개 있습니다.`
        );
      }

      const targets =
        Object.fromEntries(
          GROUPS.map(
            group => [
              group.id,
              Number(
                document
                  .getElementById(
                    `target-${group.id}`
                  )
                  .value
              )
            ]
          )
        );

      if (
        Object.values(targets).some(
          value =>
            !Number.isFinite(value) ||
            value < 0 ||
            value > 14
        )
      ) {
        return showToast(
          'A, B, C의 목표 pH를 모두 입력해 주세요.'
        );
      }

      if (
        !(
          targets.A < targets.B &&
          targets.B < targets.C
        )
      ) {
        return showToast(
          'A, B, C의 목표 pH 순서를 확인해 주세요.'
        );
      }

      state.design = {
        roles,
        targets
      };

      state.step = 4;

      saveLocal();
      render();
    }

    function readResultsFromInputs() {
      const output = {};

      for (const group of GROUPS) {
        output[group.id] = {
          actualPh:
            document.getElementById(
              `ph-${group.id}`
            )?.value ?? '',

          time:
            document.getElementById(
              `time-${group.id}`
            )?.value ?? ''
        };
      }

      return output;
    }

    function updateResultPreview() {
      for (const group of GROUPS) {
        const time =
          Number(
            document.getElementById(
              `time-${group.id}`
            )?.value
          );

        const cell =
          document.getElementById(
            `rate-${group.id}`
          );

        if (cell) {
          cell.textContent =
            Number.isFinite(time) && time > 0
              ? (1 / time).toFixed(4)
              : '-';
        }
      }
    }

    function saveResults() {
      const raw =
        readResultsFromInputs();

      const clean = {};

      for (const group of GROUPS) {
        const ph =
          Number(
            raw[group.id].actualPh
          );

        const time =
          Number(
            raw[group.id].time
          );

        if (
          !Number.isFinite(ph) ||
          ph < 0 ||
          ph > 14
        ) {
          return showToast(
            `${group.id} 조건의 실제 pH를 확인해 주세요.`
          );
        }

        if (
          !Number.isFinite(time) ||
          time <= 0 ||
          time > CONFIG.MAX_TIME_SECONDS
        ) {
          return showToast(
            `${group.id} 조건의 시간을 확인해 주세요.`
          );
        }

        clean[group.id] = {
          actualPh:ph,
          time
        };
      }

      state.results = clean;
      state.step = 5;

      saveLocal();
      render();
    }

    function makeSvgChart(calculated) {
      const width = 760;
      const height = 340;

      const left = 64;
      const right = 24;
      const top = 26;
      const bottom = 56;

      const plotWidth =
        width - left - right;

      const plotHeight =
        height - top - bottom;

      const points =
        GROUPS.map(
          (group,index) => ({
            id:group.id,

            ph:
              calculated[group.id].ph,

            rate:
              calculated[group.id].rate,

            color:[
              '#f04438',
              '#12b76a',
              '#2e90fa'
            ][index]
          })
        )
        .filter(
          point =>
            Number.isFinite(point.ph) &&
            Number.isFinite(point.rate)
        )
        .sort(
          (a,b) => a.ph - b.ph
        );

      const maxRate =
        Math.max(
          ...points.map(
            point => point.rate
          ),
          .01
        ) * 1.15;

      const x =
        ph =>
          left +
          (ph / 14) * plotWidth;

      const y =
        rate =>
          top +
          plotHeight -
          (rate / maxRate) *
          plotHeight;

      let grid = '';

      for (let index = 0; index <= 7; index += 1) {
        const ph = index * 2;
        const xPosition = x(ph);

        grid += `
          <line
            x1="${xPosition}"
            y1="${top}"
            x2="${xPosition}"
            y2="${top + plotHeight}"
            stroke="#e7ecf3"
          />

          <text
            x="${xPosition}"
            y="${top + plotHeight + 24}"
            text-anchor="middle"
            font-size="12"
            fill="#667085"
          >
            ${ph}
          </text>
        `;
      }

      for (let index = 0; index <= 4; index += 1) {
        const rate =
          maxRate * index / 4;

        const yPosition =
          y(rate);

        grid += `
          <line
            x1="${left}"
            y1="${yPosition}"
            x2="${left + plotWidth}"
            y2="${yPosition}"
            stroke="#e7ecf3"
          />

          <text
            x="${left - 10}"
            y="${yPosition + 4}"
            text-anchor="end"
            font-size="11"
            fill="#667085"
          >
            ${rate.toFixed(3)}
          </text>
        `;
      }

      const polyline =
        points.length >= 2
          ? `
            <polyline
              points="${
                points.map(
                  point =>
                    `${x(point.ph)},${y(point.rate)}`
                ).join(' ')
              }"
              fill="none"
              stroke="#667085"
              stroke-width="2"
            />
          `
          : '';

      const dots =
        points.map(
          point => `
            <circle
              cx="${x(point.ph)}"
              cy="${y(point.rate)}"
              r="8"
              fill="${point.color}"
              stroke="#fff"
              stroke-width="3"
            />

            <text
              x="${x(point.ph)}"
              y="${y(point.rate) - 14}"
              text-anchor="middle"
              font-weight="800"
              font-size="13"
              fill="#344054"
            >
              ${point.id}
            </text>
          `
        ).join('');

      return `
        <svg
          viewBox="0 0 ${width} ${height}"
          role="img"
          aria-label="pH에 따른 반응 속도 그래프"
        >
          ${grid}

          <line
            x1="${left}"
            y1="${top + plotHeight}"
            x2="${left + plotWidth}"
            y2="${top + plotHeight}"
            stroke="#344054"
            stroke-width="2"
          />

          <line
            x1="${left}"
            y1="${top}"
            x2="${left}"
            y2="${top + plotHeight}"
            stroke="#344054"
            stroke-width="2"
          />

          ${polyline}
          ${dots}

          <text
            x="${left + plotWidth / 2}"
            y="${height - 8}"
            text-anchor="middle"
            font-weight="800"
            font-size="14"
            fill="#344054"
          >
            실제 pH
          </text>

          <text
            x="18"
            y="${top + plotHeight / 2}"
            text-anchor="middle"
            font-weight="800"
            font-size="14"
            fill="#344054"
            transform="rotate(-90 18 ${top + plotHeight / 2})"
          >
            반응 속도 (s⁻¹)
          </text>
        </svg>
      `;
    }

    function renderAnalysis() {
      const calculated =
        calculateAll();

      return `
        ${pageHead(
          '📈',
          '4. 결과 해석 및 그래프',
          '측정값과 그래프를 보고 결과를 해석합니다.'
        )}

        <div class="chart-wrap">
          ${makeSvgChart(calculated)}

          <div class="chart-legend">
            ${
              GROUPS.map(
                (group,index) => `
                  <span>
                    <i
                      class="legend-dot"
                      style="
                        background:${
                          [
                            '#f04438',
                            '#12b76a',
                            '#2e90fa'
                          ][index]
                        }
                      "
                    ></i>

                    ${group.id}:
                    pH ${calculated[group.id].ph},
                    ${Number(calculated[group.id].rate).toFixed(4)}
                    s⁻¹
                  </span>
                `
              ).join('')
            }
          </div>
        </div>

        <div
          class="field"
          style="margin-top:20px"
        >
          <label class="required">
            실험 결과가 가설을 지지하나요?
          </label>

          <div class="choice-grid">
            ${
              [
                ['yes','지지한다'],
                ['partial','부분적으로 지지한다'],
                ['no','지지하지 않는다'],
                ['unclear','판단하기 어렵다']
              ]
              .map(
                ([value,text]) => `
                  <label class="choice">
                    <input
                      type="radio"
                      name="supported"
                      value="${value}"
                      ${
                        state.analysis.supported === value
                          ? 'checked'
                          : ''
                      }
                    >

                    <strong>${text}</strong>
                  </label>
                `
              )
              .join('')
            }
          </div>
        </div>

        <div class="field">
          <label
            class="required"
            for="evidence"
          >
            판단 근거
          </label>

          <textarea
            class="textarea"
            id="evidence"
            maxlength="500"
          >${safeText(state.analysis.evidence)}</textarea>
        </div>

        <div class="field">
          <label
            class="required"
            for="explanation"
          >
            결과 해석
          </label>

          <textarea
            class="textarea"
            id="explanation"
            maxlength="600"
          >${safeText(state.analysis.explanation)}</textarea>
        </div>

        <div class="field">
          <label
            class="required"
            for="limitation"
          >
            실험의 한계 또는 오차 원인
          </label>

          <textarea
            class="textarea"
            id="limitation"
            maxlength="500"
          >${safeText(state.analysis.limitation)}</textarea>
        </div>

        ${footerNav(
          '결론 작성하기',
          'saveAnalysis()'
        )}
      `;
    }

    function saveAnalysis() {
      const supported =
        document.querySelector(
          'input[name="supported"]:checked'
        )?.value || '';

      const evidence =
        document
          .getElementById('evidence')
          .value
          .trim();

      const explanation =
        document
          .getElementById('explanation')
          .value
          .trim();

      const limitation =
        document
          .getElementById('limitation')
          .value
          .trim();

      if (!supported) {
        return showToast(
          '가설 지지 여부를 선택해 주세요.'
        );
      }

      if (evidence.length < 8) {
        return showToast(
          '판단 근거를 작성해 주세요.'
        );
      }

      if (explanation.length < 8) {
        return showToast(
          '결과 해석을 작성해 주세요.'
        );
      }

      if (limitation.length < 8) {
        return showToast(
          '실험의 한계 또는 오차 원인을 작성해 주세요.'
        );
      }

      state.analysis = {
        supported,
        evidence,
        explanation,
        limitation
      };

      state.step = 6;

      saveLocal();
      render();
    }

    function renderConclusion() {
      return `
        ${pageHead(
          '✅',
          '5. 결론 도출 및 제출',
          '실험 결과를 바탕으로 자신의 결론을 작성합니다.'
        )}

        <div class="field">
          <label
            class="required"
            for="conclusion"
          >
            최종 결론
          </label>

          <textarea
            class="textarea"
            id="conclusion"
            style="min-height:220px"
            maxlength="1200"
          >${safeText(state.conclusion)}</textarea>
        </div>

        <div class="notice info">
          제출한 내용은 교사용 페이지에 저장됩니다.
        </div>

        <div class="footer-nav">
          <button
            class="btn btn-soft"
            type="button"
            onclick="goBack()"
          >
            ← 이전 단계
          </button>

          <div class="right">
            <button
              class="btn btn-soft"
              type="button"
              onclick="copySummary()"
            >
              📋 내용 복사
            </button>

            <button
              class="btn btn-primary"
              id="submitBtn"
              type="button"
              onclick="submitFinal()"
            >
              ${
                state.submitted
                  ? '다시 제출하기'
                  : '최종 제출하기'
              }
              →
            </button>
          </div>
        </div>
      `;
    }

    async function submitFinal() {
      const conclusion =
        document
          .getElementById('conclusion')
          .value
          .trim();

      if (conclusion.length < 15) {
        return showToast(
          '최종 결론을 작성해 주세요.'
        );
      }

      state.conclusion = conclusion;
      state.submitted = true;

      saveLocal();

      const button =
        document.getElementById(
          'submitBtn'
        );

      if (button) {
        button.disabled = true;
        button.textContent = '제출 중…';
      }

      const result =
        await syncToServer(true);

      if (result.ok) {
        showToast(
          '제출되었습니다. 수고했습니다! 🎉',
          4000
        );

      } else if (result.localOnly) {
        showToast(
          '이 기기에는 저장됐지만 교사 서버가 아직 연결되지 않았습니다.',
          5000
        );
      }

      render();
    }

    async function copySummary() {
      const calculated =
        calculateAll();

      const text = [
        '[카탈레이스 효소 반응 속도 탐구]',

        `${state.student.studentId} ${state.student.name}`,

        `가설: ${state.hypothesis.prediction} / ${state.hypothesis.reason}`,

        ...GROUPS.map(
          group =>
            `${group.id} 조건 실제 pH ${calculated[group.id].ph}, 시간 ${calculated[group.id].time} s, 속도 ${Number(calculated[group.id].rate).toFixed(4)} s^-1`
        ),

        `결론: ${
          document.getElementById('conclusion')?.value ||
          state.conclusion
        }`
      ].join('\n');

      try {
        await navigator.clipboard.writeText(text);

        showToast(
          '활동 내용이 복사되었습니다.'
        );

      } catch {
        showToast(
          '복사하지 못했습니다.'
        );
      }
    }

    function captureCurrentInputs() {
      try {
        if (state.step === 2) {
          state.hypothesis.prediction =
            document.querySelector(
              'input[name="prediction"]:checked'
            )?.value ||
            state.hypothesis.prediction;

          state.hypothesis.reason =
            document.getElementById(
              'hypothesisReason'
            )?.value.trim() ??
            state.hypothesis.reason;

        } else if (state.step === 3) {
          for (const item of VARIABLE_ITEMS) {
            state.design.roles[item.id] =
              document.getElementById(
                `role-${item.id}`
              )?.value || '';
          }

          for (const group of GROUPS) {
            const value =
              document.getElementById(
                `target-${group.id}`
              )?.value;

            state.design.targets[group.id] =
              value === ''
                ? ''
                : Number(value);
          }

        } else if (state.step === 4) {
          const raw =
            readResultsFromInputs();

          for (const group of GROUPS) {
            state.results[group.id].actualPh =
              raw[group.id].actualPh;

            state.results[group.id].time =
              raw[group.id].time;
          }

        } else if (state.step === 5) {
          state.analysis.supported =
            document.querySelector(
              'input[name="supported"]:checked'
            )?.value ||
            state.analysis.supported;

          state.analysis.evidence =
            document.getElementById(
              'evidence'
            )?.value.trim() ??
            state.analysis.evidence;

          state.analysis.explanation =
            document.getElementById(
              'explanation'
            )?.value.trim() ??
            state.analysis.explanation;

          state.analysis.limitation =
            document.getElementById(
              'limitation'
            )?.value.trim() ??
            state.analysis.limitation;

        } else if (state.step === 6) {
          state.conclusion =
            document.getElementById(
              'conclusion'
            )?.value.trim() ??
            state.conclusion;
        }

      } catch (error) {
        console.warn(
          'capture failed',
          error
        );
      }
    }

    function goBack() {
      captureCurrentInputs();

      if (state.step > 1) {
        state.step -= 1;
      }

      saveLocal();
      render();
    }

    function resetActivity(force = false) {
      if (
        !force &&
        !confirm(
          '이 기기에 저장된 활동 내용을 모두 지우고 처음부터 시작할까요?'
        )
      ) {
        return;
      }

      storageRemove(
        CONFIG.STORAGE_KEY
      );

      state = initialState();

      setSyncStatus(
        'local',
        '이 기기에 자동 저장'
      );

      render();

      showToast(
        '활동지가 초기화되었습니다.'
      );
    }

    window.addEventListener(
      'online',
      () => {
        setSyncStatus(
          'saving',
          '재연결 · 저장 확인 중…'
        );

        syncToServer(false);
      }
    );

    window.addEventListener(
      'offline',
      () => {
        setSyncStatus(
          'offline',
          '오프라인 · 기기에 저장'
        );
      }
    );

    window.addEventListener(
      'beforeunload',
      captureCurrentInputs
    );

    document.addEventListener(
      'DOMContentLoaded',
      () => {
        loadState();
        render();

        if (!navigator.onLine) {
          setSyncStatus(
            'offline',
            '오프라인 · 기기에 저장'
          );

        } else if (!isApiConfigured()) {
          setSyncStatus(
            'local',
            '서버 미연결 · 기기에 저장'
          );

        } else if (hasStudentIdentity()) {
          syncToServer(false);
        }
      }
    );
  </script>
</body>
</html>
