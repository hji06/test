<body class="bg-slate-50 min-h-screen text-slate-800">

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, updateDoc, onSnapshot, collection, query, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // Application Configuration & Safe Initialization
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'biotech-catalase-lab-2026';
    const firebaseConfig = typeof __firebase_config !== 'undefined' 
        ? JSON.parse(__firebase_config) 
        : {
            apiKey: "",
            authDomain: "dummy-domain.firebaseapp.com",
            projectId: "dummy-project",
            storageBucket: "dummy-bucket.appspot.com",
            messagingSenderId: "12345",
            appId: "1:12345:web:12345"
          };

    // Global App State
    window.appState = {
        appId: appId,
        role: 'student', // 'student' or 'teacher'
        currentStep: 'intro', // intro, step1, step2, step3, step4, step5, complete
        studentInfo: { grade: '2', classNum: '', studentNum: '', name: '' },
        hypothesis: { condition: '', result: '' },
        design: {
            // Variables state
            independent: null, // Should match 'ph'
            dependent: null,   // Should match 'float-time'
            controlled: [],    // Should contain 'enzyme-vol', 'h2o2-conc', 'temp', 'paper-size'
            // Test tube chemical properties assigned by students
            tubes: {
                tubeA: { chemical: 'acidic', ph: 2.0 },
                tubeB: { chemical: 'neutral', ph: 7.0 },
                tubeC: { chemical: 'basic', ph: 12.0 }
            }
        },
        results: { 
            tubeA: null, // Time in seconds
            tubeB: null, 
            tubeC: null 
        },
        analysis: { fastest: '', reason: '' },
        conclusion: { matches: '', summary: '' },
        submitted: false,
        db: null,
        auth: null,
        userId: null,
        allSubmissions: [] // For Teacher Dashboard
    };

    // Firebase Setup
    let app, db, auth;
    try {
        app = initializeApp(firebaseConfig);
        db = getFirestore(app);
        auth = getAuth(app);
        window.appState.db = db;
        window.appState.auth = auth;
    } catch (e) {
        console.error("Firebase init failed, running in sandbox mode", e);
    }

    // Auth & Auto-Sign-In (RULE 3 Priority)
    window.initAuth = async function() {
        if (!auth) return;
        try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
        } catch (err) {
            console.error("Auth failed:", err);
        }
    };

    onAuthStateChanged(auth, (user) => {
        if (user) {
            window.appState.userId = user.uid;
            console.log("Logged in as:", user.uid);
            if (window.appState.studentInfo.name) {
                loadProgress();
            }
        }
    });

    // Save Progress to Firestore
    window.saveProgress = async function() {
        if (!db || !window.appState.userId || window.appState.role === 'teacher') return;
        if (!window.appState.studentInfo.name) return; // Don't save empty profiles
        
        const pathDoc = doc(db, 'artifacts', appId, 'public', 'data', 'submissions', window.appState.userId);
        try {
            await setDoc(pathDoc, {
                userId: window.appState.userId,
                studentInfo: window.appState.studentInfo,
                currentStep: window.appState.currentStep,
                hypothesis: window.appState.hypothesis,
                design: window.appState.design,
                results: window.appState.results,
                analysis: window.appState.analysis,
                conclusion: window.appState.conclusion,
                submitted: window.appState.submitted,
                updatedAt: new Date().toISOString()
            });
        } catch (e) {
            console.error("Failed to save progress:", e);
        }
    };

    // Load Progress
    async function loadProgress() {
        if (!db || !window.appState.userId) return;
        const pathDoc = doc(db, 'artifacts', appId, 'public', 'data', 'submissions', window.appState.userId);
        try {
            const snap = await getDoc(pathDoc);
            if (snap.exists()) {
                const data = snap.data();
                window.appState.studentInfo = data.studentInfo || window.appState.studentInfo;
                window.appState.currentStep = data.currentStep || 'intro';
                window.appState.hypothesis = data.hypothesis || window.appState.hypothesis;
                window.appState.design = data.design || window.appState.design;
                window.appState.results = data.results || window.appState.results;
                window.appState.analysis = data.analysis || window.appState.analysis;
                window.appState.conclusion = data.conclusion || window.appState.conclusion;
                window.appState.submitted = data.submitted || false;
                
                updateUI();
            }
        } catch (e) {
            console.error("Failed to load progress:", e);
        }
    }

    // Subscribe to Classroom Data for Teachers
    let unsubscribeSubmissions = null;
    window.startTeacherSubscription = function() {
        if (!db) return;
        const q = collection(db, 'artifacts', appId, 'public', 'data', 'submissions');
        unsubscribeSubmissions = onSnapshot(q, (snapshot) => {
            const list = [];
            snapshot.forEach((doc) => {
                list.push(doc.data());
            });
            window.appState.allSubmissions = list;
            if (window.appState.role === 'teacher') {
                renderTeacherDashboard();
            }
        }, (error) => {
            console.error("Teacher subscription error:", error);
        });
    };

    window.stopTeacherSubscription = function() {
        if (unsubscribeSubmissions) {
            unsubscribeSubmissions();
            unsubscribeSubmissions = null;
        }
    };

    // Initialize on Page Load
    window.onload = async function() {
        await window.initAuth();
        updateUI();
    };
</script>

<div id="app-container" class="max-w-4xl mx-auto px-4 py-6">

    <!-- Header Section -->
    <header class="flex flex-col md:flex-row md:items-center justify-between bg-white rounded-2xl p-6 shadow-sm border border-slate-100 mb-6">
        <div class="flex items-center space-x-4">
            <div class="w-12 h-12 bg-indigo-100 text-indigo-600 rounded-xl flex items-center justify-center text-2xl shadow-inner relative overflow-hidden">
                <i class="fa-solid fa-flask-vial"></i>
            </div>
            <div>
                <h1 class="text-xl md:text-2xl font-bold text-slate-800 tracking-tight">🔬 카탈레이스 효소 반응 속도 탐구</h1>
                <p class="text-sm text-slate-500 font-medium">실제 탐구 기록 및 과학적 결과 그래프 시각화 활동지</p>
            </div>
        </div>
        
        <!-- Mode Switch Buttons & Student tag -->
        <div class="mt-4 md:mt-0 flex items-center justify-between md:justify-end space-x-3 border-t md:border-t-0 pt-3 md:pt-0 border-slate-100">
            <div id="student-tag" class="hidden text-xs bg-emerald-50 border border-emerald-200 text-emerald-700 font-bold px-3 py-1.5 rounded-full">
                <i class="fa-solid fa-user-graduate mr-1"></i> <span id="header-student-name">학생 모드</span>
            </div>
            <button onclick="toggleRole()" id="role-toggle-btn" class="text-xs bg-slate-800 text-white font-bold px-4 py-2 rounded-xl shadow-md hover:bg-slate-700 transition flex items-center">
                <i class="fa-solid fa-chalkboard-user mr-2"></i>교사 대시보드로 이동
            </button>
        </div>
    </header>

    <!-- Progress Steps Bar -->
    <div id="student-progress-bar" class="bg-white rounded-xl p-4 shadow-sm border border-slate-100 mb-6 flex justify-between items-center overflow-x-auto gap-4">
        <div class="flex items-center space-x-2 flex-1 justify-between min-w-[550px]">
            <div class="step-indicator flex items-center" data-step="intro">
                <span class="w-8 h-8 rounded-full bg-emerald-500 text-white flex items-center justify-center font-bold text-sm shadow">1</span>
                <span class="ml-2 text-sm font-semibold text-slate-700">시작하기</span>
            </div>
            <div class="w-6 h-0.5 bg-slate-200 flex-1"></div>
            
            <div class="step-indicator flex items-center opacity-40" data-step="step1">
                <span class="w-8 h-8 rounded-full bg-slate-200 text-slate-600 flex items-center justify-center font-bold text-sm">2</span>
                <span class="ml-2 text-sm font-semibold text-slate-500">가설 설정</span>
            </div>
            <div class="w-6 h-0.5 bg-slate-200 flex-1"></div>
            
            <div class="step-indicator flex items-center opacity-40" data-step="step2">
                <span class="w-8 h-8 rounded-full bg-slate-200 text-slate-600 flex items-center justify-center font-bold text-sm">3</span>
                <span class="ml-2 text-sm font-semibold text-slate-500">실험 설계</span>
            </div>
            <div class="w-6 h-0.5 bg-slate-200 flex-1"></div>
            
            <div class="step-indicator flex items-center opacity-40" data-step="step3">
                <span class="w-8 h-8 rounded-full bg-slate-200 text-slate-600 flex items-center justify-center font-bold text-sm">4</span>
                <span class="ml-2 text-sm font-semibold text-slate-500">결과 기록</span>
            </div>
            <div class="w-6 h-0.5 bg-slate-200 flex-1"></div>
            
            <div class="step-indicator flex items-center opacity-40" data-step="step4">
                <span class="w-8 h-8 rounded-full bg-slate-200 text-slate-600 flex items-center justify-center font-bold text-sm">5</span>
                <span class="ml-2 text-sm font-semibold text-slate-500">속도 해석</span>
            </div>
            <div class="w-6 h-0.5 bg-slate-200 flex-1"></div>
            
            <div class="step-indicator flex items-center opacity-40" data-step="step5">
                <span class="w-8 h-8 rounded-full bg-slate-200 text-slate-600 flex items-center justify-center font-bold text-sm">6</span>
                <span class="ml-2 text-sm font-semibold text-slate-500">결론 & 제출</span>
            </div>
        </div>
    </div>

    <main id="main-content" class="bg-white rounded-3xl p-6 md:p-8 shadow-sm border border-slate-100 min-h-[400px]">
        <!-- Screen contents are injected dynamically -->
    </main>

    <!-- Custom Modal Dialog (Avoids native alert) -->
    <div id="custom-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl max-w-sm w-full p-6 shadow-xl border border-slate-100 fade-in">
            <h3 id="modal-title" class="text-lg font-bold text-slate-800 mb-2">알림</h3>
            <p id="modal-body" class="text-sm text-slate-600 mb-6">메시지 내용</p>
            <div class="flex justify-end space-x-2" id="modal-actions">
                <button onclick="closeModal()" class="px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 font-semibold rounded-xl text-sm transition">닫기</button>
            </div>
        </div>
    </div>
</div>

<script>
    // General Dialog Popup Controller
    function showModal(title, text, actionCallback = null, cancelCallback = null) {
        const modal = document.getElementById('custom-modal');
        document.getElementById('modal-title').textContent = title;
        document.getElementById('modal-body').innerHTML = text;
        const actionArea = document.getElementById('modal-actions');
        
        actionArea.innerHTML = '';
        if (cancelCallback) {
            const cancelBtn = document.createElement('button');
            cancelBtn.className = "px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 font-semibold rounded-xl text-sm transition";
            cancelBtn.textContent = "취소";
            cancelBtn.onclick = () => { closeModal(); cancelCallback(); };
            actionArea.appendChild(cancelBtn);
        }
        
        const confirmBtn = document.createElement('button');
        confirmBtn.className = "px-5 py-2 bg-indigo-500 hover:bg-indigo-600 text-white font-semibold rounded-xl text-sm shadow-md transition";
        confirmBtn.textContent = "확인";
        confirmBtn.onclick = () => {
            closeModal();
            if (actionCallback) actionCallback();
        };
        actionArea.appendChild(confirmBtn);
        modal.classList.remove('hidden');
    }

    function closeModal() {
        document.getElementById('custom-modal').classList.add('hidden');
    }

    // Role Toggling System (Science Teacher Verification)
    function toggleRole() {
        if (window.appState.role === 'student') {
            showModal(
                "🔑 교사 대시보드 로그인",
                `교사 인증 비밀번호를 입력해주세요.<br><br><input type="password" id="teacher-pw" class="w-full mt-2 p-3 bg-slate-50 border border-slate-200 rounded-xl outline-indigo-500" placeholder="비밀번호는 science 입니다">`,
                () => {
                    const pw = document.getElementById('teacher-pw').value;
                    if (pw === 'science') {
                        window.appState.role = 'teacher';
                        document.getElementById('role-toggle-btn').innerHTML = `<i class="fa-solid fa-user-graduate mr-2"></i>학생 모드로 전환`;
                        document.getElementById('role-toggle-btn').classList.replace('bg-slate-800', 'bg-indigo-600');
                        document.getElementById('student-progress-bar').classList.add('hidden');
                        document.getElementById('student-tag').classList.add('hidden');
                        
                        if (window.startTeacherSubscription) {
                            window.startTeacherSubscription();
                        }
                        updateUI();
                    } else {
                        showModal("⚠️ 오류", "비밀번호가 맞지 않습니다.");
                    }
                },
                () => { console.log('Teacher authorization canceled'); }
            );
        } else {
            window.appState.role = 'student';
            document.getElementById('role-toggle-btn').innerHTML = `<i class="fa-solid fa-chalkboard-user mr-2"></i>교사 대시보드로 이동`;
            document.getElementById('role-toggle-btn').classList.replace('bg-indigo-600', 'bg-slate-800');
            document.getElementById('student-progress-bar').classList.remove('hidden');
            
            if (window.stopTeacherSubscription) {
                window.stopTeacherSubscription();
            }
            updateUI();
        }
    }

    // Navigating Steps
    function navigateTo(step) {
        if (window.appState.role === 'student' && step !== 'intro' && !window.appState.studentInfo.name) {
            showModal("입력 필요", "실험을 기록하기 전 반드시 상단의 학년, 반, 번호, 이름을 입력해주세요.");
            return;
        }
        window.appState.currentStep = step;
        if (window.appState.role === 'student' && window.saveProgress) {
            window.saveProgress();
        }
        updateUI();
    }

    // Progress Bar Indicator Updates
    function updateProgressIndicators() {
        const steps = ['intro', 'step1', 'step2', 'step3', 'step4', 'step5'];
        const currentIndex = steps.indexOf(window.appState.currentStep);
        
        document.querySelectorAll('.step-indicator').forEach((el, index) => {
            const stepNumSpan = el.querySelector('span:first-child');
            const stepTextSpan = el.querySelector('span:last-child');
            
            if (index < currentIndex) {
                el.classList.remove('opacity-40');
                stepNumSpan.className = "w-8 h-8 rounded-full bg-indigo-100 text-indigo-600 flex items-center justify-center font-bold text-sm border-2 border-indigo-500 shadow-sm";
                stepNumSpan.innerHTML = '<i class="fa-solid fa-check"></i>';
                stepTextSpan.className = "ml-2 text-sm font-semibold text-indigo-600";
            } else if (index === currentIndex) {
                el.classList.remove('opacity-40');
                stepNumSpan.className = "w-8 h-8 rounded-full bg-indigo-600 text-white flex items-center justify-center font-bold text-sm shadow-md ring-4 ring-indigo-100";
                stepNumSpan.innerHTML = (index + 1).toString();
                stepTextSpan.className = "ml-2 text-sm font-bold text-slate-800";
            } else {
                el.classList.add('opacity-40');
                stepNumSpan.className = "w-8 h-8 rounded-full bg-slate-100 text-slate-400 flex items-center justify-center font-bold text-sm border border-slate-200";
                stepNumSpan.innerHTML = (index + 1).toString();
                stepTextSpan.className = "ml-2 text-sm font-medium text-slate-400";
            }
        });
    }

    // Primary UI Dispatcher
    function updateUI() {
        if (window.appState.role === 'teacher') {
            renderTeacherDashboard();
            return;
        }

        const sInfo = window.appState.studentInfo;
        if (sInfo.name) {
            document.getElementById('student-tag').classList.remove('hidden');
            document.getElementById('header-student-name').textContent = `${sInfo.grade}학년 ${sInfo.classNum}반 ${sInfo.studentNum}번 ${sInfo.name}`;
        } else {
            document.getElementById('student-tag').classList.add('hidden');
        }

        updateProgressIndicators();

        const main = document.getElementById('main-content');
        main.className = "bg-white rounded-3xl p-6 md:p-8 shadow-sm border border-slate-100 min-h-[400px] fade-in";
        
        switch (window.appState.currentStep) {
            case 'intro':
                renderIntroScreen(main);
                break;
            case 'step1':
                renderHypothesisScreen(main);
                break;
            case 'step2':
                renderDesignScreen(main);
                break;
            case 'step3':
                renderLabScreen(main);
                break;
            case 'step4':
                renderGraphScreen(main);
                break;
            case 'step5':
                renderConclusionScreen(main);
                break;
            case 'complete':
                renderCompleteScreen(main);
                break;
        }
    }
</script>

<script>
    function renderIntroScreen(container) {
        const s = window.appState.studentInfo;
        container.innerHTML = `
            <div class="max-w-xl mx-auto py-4">
                <div class="text-center mb-8">
                    <span class="bg-indigo-50 text-indigo-700 text-xs font-bold px-3 py-1 rounded-full uppercase tracking-wider">II. 생물의 특성과 생명 활동</span>
                    <h2 class="text-2xl font-black text-slate-800 mt-2 mb-3 md:text-3xl">효소 반응 속도 탐구 활동지</h2>
                    <p class="text-slate-500 leading-relaxed text-sm md:text-base">
                        이 활동지는 갤럭시 탭에 최적화되어 있습니다. 실제 실험을 수행하면서, <strong>감자 속에 가득 찬 카탈레이스 효소</strong>가 산성, 중성, 염기성 상태에서 각각 과산화수소를 분해하는 데 걸리는 실제 시간을 측정하고 이론을 분석해봅시다.
                    </p>
                </div>

                <div class="bg-slate-50 rounded-2xl p-6 border border-slate-100 mb-8">
                    <h3 class="text-md font-bold text-slate-700 mb-4 flex items-center">
                        <i class="fa-solid fa-id-card mr-2 text-indigo-500"></i> 나의 학습 모둠 및 학생명 입력
                    </h3>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                        <div>
                            <label class="block text-xs font-semibold text-slate-500 mb-1">학년</label>
                            <select id="reg-grade" class="w-full p-3 bg-white border border-slate-200 rounded-xl outline-indigo-500 font-bold text-slate-700">
                                <option value="2" ${s.grade === '2' ? 'selected' : ''}>2학년</option>
                                <option value="1" ${s.grade === '1' ? 'selected' : ''}>1학년</option>
                                <option value="3" ${s.grade === '3' ? 'selected' : ''}>3학년</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-slate-500 mb-1">반 (숫자만)</label>
                            <input type="number" pattern="[0-9]*" id="reg-class" value="${s.classNum}" class="w-full p-3 bg-white border border-slate-200 rounded-xl outline-indigo-500 font-bold text-center" placeholder="예: 3">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-slate-500 mb-1">번호 (숫자만)</label>
                            <input type="number" pattern="[0-9]*" id="reg-num" value="${s.studentNum}" class="w-full p-3 bg-white border border-slate-200 rounded-xl outline-indigo-500 font-bold text-center" placeholder="예: 15">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-slate-500 mb-1">이름</label>
                            <input type="text" id="reg-name" value="${s.name}" class="w-full p-3 bg-white border border-slate-200 rounded-xl outline-indigo-500 font-bold" placeholder="홍길동">
                        </div>
                    </div>
                </div>

                <div class="text-center">
                    <button onclick="submitStudentInfo()" class="w-full md:w-auto px-8 py-4 bg-indigo-500 hover:bg-indigo-600 text-white font-bold rounded-2xl shadow-lg transition transform hover:-translate-y-0.5 active:translate-y-0 flex items-center justify-center space-x-2">
                        <span>실험 가설 설정하러 가기</span>
                        <i class="fa-solid fa-arrow-right"></i>
                    </button>
                </div>
            </div>
        `;
    }

    function submitStudentInfo() {
        const grade = document.getElementById('reg-grade').value;
        const classNum = document.getElementById('reg-class').value.trim();
        const studentNum = document.getElementById('reg-num').value.trim();
        const name = document.getElementById('reg-name').value.trim();

        if (!classNum || !studentNum || !name) {
            showModal("⚠️ 입력 완료 필요", "본인의 정보(반, 번호, 이름)를 완전히 기록해야 교사에게 올바른 정보가 제출됩니다.");
            return;
        }

        window.appState.studentInfo = { grade, classNum, studentNum, name };
        
        if (window.saveProgress) {
            window.saveProgress();
        }

    function setHypothesisCondition(val) {
        window.appState.hypothesis.condition = val;

            const btn = document.getElementById(`btn-hyp-${cond}`);
            if (cond === val) {
                btn.className = "p-3 border rounded-xl text-sm font-bold transition flex items-center justify-center space-x-2 bg-indigo-500 border-indigo-500 text-white shadow-md";
            } else {
                btn.className = "p-3 border rounded-xl text-sm font-bold transition flex items-center justify-center space-x-2 bg-white border-slate-200 hover:bg-slate-100";
            }
        });
    }

    function setHypothesisResult(val) {
        window.appState.hypothesis.result = val;
        document.getElementById('hyp-disp-res').textContent = getKoreanRes(val);
        ['fast', 'slow'].forEach(res => {
            const btn = document.getElementById(`btn-hyp-${res}`);
            if (res === val) {
                btn.className = "p-3 border rounded-xl text-sm font-bold transition flex items-center justify-center space-x-2 bg-indigo-500 border-indigo-500 text-white shadow-md";
            } else {
                btn.className = "p-3 border rounded-xl text-sm font-bold transition flex items-center justify-center space-x-2 bg-white border-slate-200 hover:bg-slate-100";
            }
        });
    }

    function getKoreanCond(cond) {
        if (cond === 'acidic') return '산성 (pH 2 부근)';
        if (cond === 'neutral') return '중성 (pH 7 부근)';
        if (cond === 'basic') return '염기성 (pH 12 부근)';
        return '____';
    }

    function getKoreanRes(res) {
        if (res === 'fast') return '가장 빠를 것이다';
        if (res === 'slow') return '가장 느릴 것이다';
        return '____';
    }

    function submitHypothesis() {
        const h = window.appState.hypothesis;
        if (!h.condition || !h.result) {
            showModal("⚠️ 알림", "가설의 액성 조건과 예상 반응 결과를 모두 채워주어야 탐구 진행이 가능합니다.");
            return;
        }
        navigateTo('step2');

    function assignVariable(vid, slotType) {
        const d = window.appState.design;
        
        // Remove from other slots to prevent duplicate assignment
        if (d.independent === vid) d.independent = null;
        if (d.dependent === vid) d.dependent = null;
        const cIdx = d.controlled.indexOf(vid);
        if (cIdx > -1) d.controlled.splice(cIdx, 1);

        // Assign to new slot
        if (slotType === 'independent') {
            d.independent = vid;
        } else if (slotType === 'dependent') {
            d.dependent = vid;
        } else if (slotType === 'controlled') {
            d.controlled.push(vid);
        }

        renderDesignScreen(document.getElementById('main-content'));
    }

    function clearVariable(vid) {
        const d = window.appState.design;
        if (d.independent === vid) d.independent = null;
        if (d.dependent === vid) d.dependent = null;
        const cIdx = d.controlled.indexOf(vid);
        if (cIdx > -1) d.controlled.splice(cIdx, 1);

        renderDesignScreen(document.getElementById('main-content'));
    }

    function updateTubeDesign(tube, key, val) {
        window.appState.design.tubes[tube][key] = val;
        // Auto-assign default theoretical pH value on select
        if (key === 'chemical') {
            if (val === 'acidic') window.appState.design.tubes[tube].ph = 2.0;
            else if (val === 'neutral') window.appState.design.tubes[tube].ph = 7.0;
            else if (val === 'basic') window.appState.design.tubes[tube].ph = 12.0;
        }
        updateDesignGuide();
    }

    // Dynamic generation of experimental procedure matching current student inputs
    function updateDesignGuide() {
        const d = window.appState.design;
        const guideContainer = document.getElementById('design-guide-content');
        const badge = document.getElementById('design-validation-badge');
        if (!guideContainer || !badge) return;

        // Scientific Correctness evaluation logic
        const isIndependentCorrect = (d.independent === 'ph');
        const isDependentCorrect = (d.dependent === 'float-time');
        // Needs at least 3 controlled variables correct (enzyme-vol, h2o2-conc, temp, paper-size)
        const expectedControls = ['enzyme-vol', 'h2o2-conc', 'temp', 'paper-size'];
        const matchesControlsCount = d.controlled.filter(v => expectedControls.includes(v)).length;
        const isControlledCorrect = matchesControlsCount >= 3;

        // Test Tubes chemical set evaluation (A: acidic, B: neutral, C: basic)
        const isTubesCorrect = (d.tubes.tubeA.chemical === 'acidic' && d.tubes.tubeB.chemical === 'neutral' && d.tubes.tubeC.chemical === 'basic');

        const overallSuccess = isIndependentCorrect && isDependentCorrect && isControlledCorrect && isTubesCorrect;

        if (overallSuccess) {
            badge.textContent = "✅ 완벽한 설계 설계 완료!";
            badge.className = "text-[9px] px-2.5 py-1 rounded bg-emerald-600 text-white font-black shadow-sm";
            guideContainer.innerHTML = `
                <div class="space-y-3">
                    <p class="font-bold text-white text-sm"><i class="fa-solid fa-vials text-indigo-400 mr-1"></i> [자동 생성] 설정한 완벽한 설계에 따른 탐구 가이드:</p>
                    <ol class="list-decimal list-inside space-y-2 text-slate-300">
                        <li>
                            <strong class="text-white">실험 준비 및 통제:</strong> 과산화수소수의 농도와 부피, 감자즙의 양, 거름종이 조각의 크기를 정확히 동일하게 통제합니다.
                        </li>

                            시험관 <span class="bg-red-500/30 text-red-300 px-1.5 py-0.5 rounded font-bold">A</span>에 묽은 염산,

                        </li>
                        <li>
                            <strong class="text-white">실제 pH 측정:</strong> 각 시험관의 반응 물질에 3% H₂O₂를 주입하기 직전, 실제 pH 시험지나 pH 미터기로 실측 pH 값을 꼭 읽고 기록해 둡니다.
                        </li>
                        <li>
                            <strong class="text-white">반응 개시 및 측정:</strong> 동그란 거름종이를 핀셋으로 감자즙에 적셔 가라앉히고 수면 위까지 상승하는 데 걸린 초 단위를 측정합니다.
                        </li>
                    </ol>
                </div>
            `;
        } else {
            badge.textContent = "⚠️ 설계 조정이 필요합니다";
            badge.className = "text-[9px] px-2.5 py-1 rounded bg-amber-500 text-slate-900 font-black";

            let advices = [];
            if (!isIndependentCorrect) advices.push("의도적으로 변화를 주는 <strong class='text-white'>'조작 변인(독립변인)'</strong>은 수용액의 pH여야 합니다.");
            if (!isDependentCorrect) advices.push("실험 측정 결과에 해당하는 <strong class='text-white'>'종속 변인'</strong>은 거름종이가 완전히 떠오르는 데 걸린 시간이어야 합니다.");
            if (!isControlledCorrect) advices.push("실험의 정밀도를 위해 <strong class='text-white'>'통제 변인'</strong>(감자즙 양, 과산화수소 농도 및 부피, 온도, 거름종이 크기 등)을 최소 3개 이상 등록해주세요.");
            if (!isTubesCorrect) advices.push("시험관 A, B, C의 액성 구성을 <strong class='text-white'>A(산성) - B(중성) - C(염기성)</strong> 조합으로 완성해야 대조군 비교가 가능합니다.");

            guideContainer.innerHTML = `
                <div class="space-y-2">
                    <p class="font-bold text-amber-300 text-xs"><i class="fa-solid fa-triangle-exclamation mr-1"></i> 올바른 탐구를 설계하기 위한 실시간 코칭 제안:</p>

    function submitExperimentalDesign() {
        const d = window.appState.design;
        const isIndependentCorrect = (d.independent === 'ph');
        const isDependentCorrect = (d.dependent === 'float-time');
        const expectedControls = ['enzyme-vol', 'h2o2-conc', 'temp', 'paper-size'];
        const matchesControlsCount = d.controlled.filter(v => expectedControls.includes(v)).length;
        const isControlledCorrect = matchesControlsCount >= 3;
        const isTubesCorrect = (d.tubes.tubeA.chemical === 'acidic' && d.tubes.tubeB.chemical === 'neutral' && d.tubes.tubeC.chemical === 'basic');

        if (!isIndependentCorrect || !isDependentCorrect || !isControlledCorrect || !isTubesCorrect) {
            showModal("⚠️ 설계 오류 보완 필요", "설정된 과학적 탐구 변인이나 시험관 설정이 일치하지 않습니다. 실시간 설계 검토 조언을 참고하여 수정해주십시오.");
            return;
        }

        navigateTo('step3');
    }
</script>

    // Handlers for parameters changes
    function updateRealPH(tube, val) {
        if (val === '') return;
        window.appState.design.tubes[tube].ph = parseFloat(val);
    }

    function updateRealTime(tube, val) {
        if (val === '') {
            window.appState.results[tube] = null;
        } else {
            window.appState.results[tube] = parseFloat(val);
        }
    }

    function openTimerHelper(tube) {
        activeTargetTube = tube;
        const tubeKorean = tube === 'tubeA' ? 'A (산성)' : tube === 'tubeB' ? 'B (중성)' : 'C (염기성)';
        
        document.getElementById('stopwatch-modal-container').classList.remove('hidden');
        document.getElementById('target-timer-title').textContent = `시험관 ${tubeKorean} 타이머 보조 측정도구`;
        
        // Reset and update display to previous result if any
        resetActiveTimer();
        const existingVal = window.appState.results[tube];
        if (existingVal) {
            timerElapsedTime = existingVal * 1000;
            document.getElementById('stopwatch-display-panel').innerHTML = `${existingVal.toFixed(2)} <span class="text-xs font-sans text-slate-400">초</span>`;
        }
    }

    function controlTimerState() {
        const btn = document.getElementById('btn-timer-trigger');
        if (activeTimer) {
            // Stop logic
            clearInterval(activeTimer);
            activeTimer = null;
            btn.textContent = "계속";
            btn.classList.replace('bg-red-500', 'bg-indigo-600');
            
            // Auto write to time input field and store
            const finalSec = parseFloat((timerElapsedTime / 1000).toFixed(2));
            window.appState.results[activeTargetTube] = finalSec;
            
            const field = document.getElementById(`time-${activeTargetTube}`);
            if (field) field.value = finalSec;
        } else {
            // Start logic
            timerStartTime = Date.now() - timerElapsedTime;
            activeTimer = setInterval(() => {
                timerElapsedTime = Date.now() - timerStartTime;
                document.getElementById('stopwatch-display-panel').innerHTML = `${(timerElapsedTime / 1000).toFixed(2)} <span class="text-xs font-sans text-slate-400">초</span>`;
            }, 30);
            btn.textContent = "정지";
            btn.className = "px-5 py-2 bg-red-500 hover:bg-red-600 text-white font-bold text-xs rounded-xl shadow transition";
        }
    }

    function resetActiveTimer() {
        if (activeTimer) {
            clearInterval(activeTimer);
            activeTimer = null;
        }
        timerElapsedTime = 0;
        document.getElementById('stopwatch-display-panel').innerHTML = `0.00 <span class="text-xs font-sans text-slate-400">초</span>`;
        const btn = document.getElementById('btn-timer-trigger');
        if (btn) {
            btn.textContent = "시작";
            btn.className = "px-5 py-2 bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-xs rounded-xl shadow transition";
        }
    }

    function closeTimerHelper() {
        if (activeTimer) {
            clearInterval(activeTimer);
            activeTimer = null;
        }
        // Finalize results and write
        const finalSec = parseFloat((timerElapsedTime / 1000).toFixed(2));
        if (finalSec > 0) {
            window.appState.results[activeTargetTube] = finalSec;
            const field = document.getElementById(`time-${activeTargetTube}`);
            if (field) field.value = finalSec;
        }
        document.getElementById('stopwatch-modal-container').classList.add('hidden');
        activeTargetTube = null;
    }

    function validateAndGoToGraph() {
        const r = window.appState.results;
        const d = window.appState.design;

        const allTimesWritten = r.tubeA !== null && r.tubeB !== null && r.tubeC !== null;

    function initVelocityChart(phA, rateA, phB, rateB, phC, rateC) {
        const ctx = document.getElementById('canvas-rate-chart');
        if (!ctx) return;

        if (rateChartObj) {
            rateChartObj.destroy();
        }

        rateChartObj = new Chart(ctx, {
            type: 'line', // Continuous line represents reaction rate vs pH curves perfectly
            data: {
                labels: [`A (pH ${phA})`, `B (pH ${phB})`, `C (pH ${phC})`],
                datasets: [{
                    label: '효소 반응 속도 (1/시간, s⁻¹)',
                    data: [rateA, rateB, rateC],
                    borderColor: 'rgb(99, 102, 241)',

            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false }

                    y: {
                        beginAtZero: true,

                btn.className = "p-2 border rounded-xl text-xs font-bold transition bg-white border-slate-200 hover:bg-slate-100";
            }
        });
        checkScientificCorrectnessFeedback();
    }

    function setAnalysisReason(val) {
        window.appState.analysis.reason = val;
        checkScientificCorrectnessFeedback();
    }

    // Auto grading system for feedback
    function checkScientificCorrectnessFeedback() {
        const a = window.appState.analysis;
        const panel = document.getElementById('analysis-feedback-panel');
        if (!panel) return;

        if (!a.fastest || !a.reason) {
            panel.classList.add('hidden');
            return;
        }

        panel.classList.remove('hidden');
        if (a.fastest === 'tubeB' && a.reason === 'neutral-active') {
            panel.className = "p-4 rounded-xl text-xs bg-emerald-50 text-emerald-800 border border-emerald-100 font-bold fade-in";

        }
    }

        const a = window.appState.analysis;

            showModal("⚠️ 작성 미완료", "결과 해석 질문 2가지에 모두 답해주셔야 탐구 보고서 제출 전 단계로 넘어갈 수 있습니다.");
            return;
        }
        navigateTo('step5');
    }

        showModal(
            "실험 초기화 경고",
            "기록했던 변인 설정과 타이머 시간이 모두 제거되고 초기 단계로 돌아갑니다. 다시 시작하시겠습니까?",
            () => {
                window.appState.currentStep = 'intro';
                window.appState.submitted = false;
                window.appState.hypothesis = { condition: '', result: '' };
                window.appState.design = {
                    independent: null,
                    dependent: null,
                    controlled: [],
                    tubes: {
                        tubeA: { chemical: 'acidic', ph: 2.0 },
                        tubeB: { chemical: 'neutral', ph: 7.0 },
                        tubeC: { chemical: 'basic', ph: 12.0 }
                    }
                };
                window.appState.results = { tubeA: null, tubeB: null, tubeC: null };
                window.appState.analysis = { fastest: '', reason: '' };
                window.appState.conclusion = { matches: '', summary: '' };
                
                if (window.saveProgress) {
                    window.saveProgress();
                }
                updateUI();
            }
        );
    }
</script>

<script>
    let teacherGraphObj = null;

    function renderTeacherDashboard() {
        const main = document.getElementById('main-content');
        main.className = "bg-white rounded-3xl p-6 md:p-8 shadow-sm border border-slate-100 min-h-[400px] fade-in";

        const submissions = window.appState.allSubmissions || [];
        const totalJoined = submissions.length;
        const totalSubmitted = submissions.filter(s => s.submitted).length;

        // Calculate class average reaction speed reciprocal (1/t)
        let sumA = 0, sumB = 0, sumC = 0;
        let countA = 0, countB = 0, countC = 0;

        submissions.forEach(sub => {
            if (sub.results) {
                if (sub.results.tubeA > 0) { sumA += (1 / sub.results.tubeA); countA++; }
                if (sub.results.tubeB > 0) { sumB += (1 / sub.results.tubeB); countB++; }
                if (sub.results.tubeC > 0) { sumC += (1 / sub.results.tubeC); countC++; }
            }
        });

        const avgA = countA > 0 ? (sumA / countA).toFixed(4) : 0;
        const avgB = countB > 0 ? (sumB / countB).toFixed(4) : 0;
        const avgC = countC > 0 ? (sumC / countC).toFixed(4) : 0;

        main.innerHTML = `
            <div>
                <!-- Top Status Banner -->
                <div class="mb-6 flex flex-col md:flex-row md:items-center justify-between border-b border-slate-100 pb-5 gap-4">
                    <div>
                        <span class="text-xs bg-indigo-50 text-indigo-700 font-bold px-3 py-1 rounded-full"><i class="fa-solid fa-chart-line"></i> 교사용 실시간 분석 허브</span>
                        <h2 class="text-2xl font-black text-slate-800 mt-1">🔬 실험 실시간 모니터링 대시보드</h2>
                        <p class="text-xs text-slate-400 mt-1">학급 갤럭시 탭(디벗) 데이터가 끊김 없이 실시간으로 연동되는 화면입니다.</p>
                    </div>
                    
                    <div class="flex items-center space-x-3 bg-slate-50 p-3 rounded-2xl border border-slate-100">
                        <div class="text-center px-4 border-r border-slate-200">
                            <span class="block text-[10px] text-slate-400 font-bold">전체 참여 모둠/개인</span>
                            <strong class="text-lg font-black text-slate-700">${totalJoined}명</strong>
                        </div>
                        <div class="text-center px-2">
                            <span class="block text-[10px] text-slate-400 font-bold">보고서 최종 제출</span>
                            <strong class="text-lg font-black text-indigo-600">${totalSubmitted}명</strong>
                        </div>
                    </div>
                </div>

                <!-- Statistics layout -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                    
                    <!-- Class average line graph -->
                    <div class="bg-slate-50 rounded-2xl p-5 border border-slate-100 flex flex-col justify-between">
                        <h3 class="text-xs font-bold text-slate-500 mb-4 uppercase tracking-wider">📊 학급 전체 실시간 평균 효소 반응 속도 ($1/t$)</h3>
                        <div class="flex-1 min-h-[220px] flex items-center justify-center">
                            <canvas id="canvas-teacher-stats"></canvas>
                        </div>
                        <div class="grid grid-cols-3 gap-2 text-center mt-3 pt-3 border-t border-slate-200 text-xs">
                            <div>
                                <span class="text-[10px] text-slate-400">평균 A (산성)</span>
                                <strong class="block text-red-500 font-mono">${avgA}</strong>
                            </div>
                            <div>
                                <span class="text-[10px] text-slate-400">평균 B (중성)</span>
                                <strong class="block text-emerald-500 font-mono">${avgB}</strong>
                            </div>
                            <div>
                                <span class="text-[10px] text-slate-400">평균 C (염기성)</span>
                                <strong class="block text-blue-500 font-mono">${avgC}</strong>
                            </div>
                        </div>
                    </div>

                    <!-- Teacher quick helper cards -->
                    <div class="space-y-4">
                        <div class="p-5 bg-indigo-50 text-indigo-950 rounded-2xl border border-indigo-100">
                            <h4 class="text-xs font-bold mb-2 flex items-center"><i class="fa-solid fa-chalkboard-user mr-1.5"></i> 모둠 피드백 교사 안내 가이드</h4>
                            <ul class="list-disc list-inside space-y-2 text-[11px] leading-relaxed opacity-95">
                                <li>학생들의 오프라인 탐구 결과 데이터가 실시간으로 수집되는 화면입니다.</li>
                                <li><strong>반응 속도($1/t$)</strong>는 높을수록 촉매 작용이 활발함을 나타내며, 대조군인 중성(B)이 가장 높게 형성되어야 완벽한 과학적 검증이 이루어진 것입니다.</li>
                                <li>변인 분류 설계 단계에서 어려움을 겪고 있는지 실시간 진척 수준표를 통해 확인하고 현장 개별 지도를 수행해주세요.</li>
                            </ul>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div class="p-4 bg-emerald-50/50 rounded-xl border border-emerald-100">
                                <span class="text-[10px] text-slate-400 font-bold block">대조군(B) 반응 최고점 달성율</span>
                                <strong class="text-md text-emerald-800 block mt-1">실시간 자동 분석 중</strong>
                            </div>
                            <div class="p-4 bg-amber-50/50 rounded-xl border border-amber-100">
                                <span class="text-[10px] text-slate-400 font-bold block">기기 환경 상태</span>
                                <strong class="text-md text-amber-800 block mt-1">갤럭시 탭(디벗) 전용</strong>
                            </div>
                        </div>
                    </div>

                </div>

                <!-- Students real-time detailed list -->
                <div class="border border-slate-100 rounded-2xl overflow-hidden shadow-sm">
                    <div class="bg-slate-50 px-5 py-4 border-b border-slate-100">
                        <h3 class="text-sm font-bold text-slate-700">📋 개별 학생 탐구 성취 상태</h3>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-xs border-collapse">
                            <thead>
                                <tr class="bg-slate-100/60 border-b border-slate-100 text-slate-500 uppercase font-semibold">
                                    <th class="p-4">학년 반 번호 이름</th>
                                    <th class="p-4">현재 위치</th>
                                    <th class="p-4">A(산성) 속도</th>
                                    <th class="p-4">B(중성) 속도</th>
                                    <th class="p-4">C(염기성) 속도</th>
                                    <th class="p-4">진행 현황</th>
                                    <th class="p-4 text-center">보고서 상세 검토</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-slate-100">
                                ${submissions.length === 0 ? `
                                    <tr>
                                        <td colspan="7" class="p-8 text-center text-slate-400 font-medium">현재 접속해서 실험 기록을 생성 중인 학생이 없습니다.</td>
                                    </tr>
                                ` : submissions.map(sub => {
                                    const s = sub.studentInfo || { name: '익명', grade: '', classNum: '', studentNum: '' };
                                    const stepName = getStepNameKOR(sub.currentStep);
                                    const results = sub.results || { tubeA: null, tubeB: null, tubeC: null };
                                    
                                    const vA = results.tubeA > 0 ? (1 / results.tubeA).toFixed(3) : '-';
                                    const vB = results.tubeB > 0 ? (1 / results.tubeB).toFixed(3) : '-';
                                    const vC = results.tubeC > 0 ? (1 / results.tubeC).toFixed(3) : '-';

                                    return `
                                        <tr class="hover:bg-slate-50 transition">
                                            <td class="p-4 font-bold text-slate-800">${s.grade}학년 ${s.classNum}반 ${s.studentNum}번 ${s.name}</td>
                                            <td class="p-4 font-semibold text-slate-600">${stepName}</td>
                                            <td class="p-4 font-mono font-bold text-red-500">${vA} (실측 pH: ${sub.design?.tubes?.tubeA?.ph || '-'})</td>
                                            <td class="p-4 font-mono font-bold text-emerald-500">${vB} (실측 pH: ${sub.design?.tubes?.tubeB?.ph || '-'})</td>
                                            <td class="p-4 font-mono font-bold text-blue-500">${vC} (실측 pH: ${sub.design?.tubes?.tubeC?.ph || '-'})</td>
                                            <td class="p-4">
                                                <span class="px-2 py-1 rounded-full text-[9px] font-bold ${sub.submitted ? 'bg-emerald-100 text-emerald-800' : 'bg-amber-100 text-amber-800'}">
                                                    ${sub.submitted ? '보고서 제출완료' : '작성 기록중'}
                                                </span>
                                            </td>
                                            <td class="p-4 text-center">
                                                <button onclick="showStudentDetailModal('${sub.userId}')" class="px-3 py-1 bg-indigo-50 hover:bg-indigo-100 text-indigo-700 font-bold rounded-lg transition text-[10px]">
                                                    가설/변인 검토
                                                </button>
                                            </td>
                                        </tr>
                                    `;
                                }).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        `;

        // Render teacher average chart
        setTimeout(() => {
            initTeacherStatsChart(avgA, avgB, avgC);
        }, 50);
    }

    function getStepNameKOR(step) {
        switch(step) {
            case 'intro': return '1단계: 개인 식별';
            case 'step1': return '2단계: 가설 구상';
            case 'step2': return '3단계: 변인 매칭';
            case 'step3': return '4단계: 결과 기록';
            case 'step4': return '5단계: 속도 해석';
            case 'step5': return '6단계: 결론 도출';
            case 'complete': return '🎉 최종 제출 완료';
            default: return '진행 중';
        }
    }

    // Teacher Dashboard Class Average Chart JS (1/t vs pH)
    function initTeacherStatsChart(avgA, avgB, avgC) {
        const ctx = document.getElementById('canvas-teacher-stats');
        if (!ctx) return;

        if (teacherGraphObj) {
            teacherGraphObj.destroy();
        }

        teacherGraphObj = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['A (산성 평균)', 'B (중성 평균)', 'C (염기성 평균)'],
                datasets: [{
                    label: '학급 평균 속도 (1/t, s⁻¹)',
                    data: [avgA, avgB, avgC],
                    backgroundColor: [
                        'rgba(239, 68, 68, 0.6)',
                        'rgba(16, 185, 129, 0.6)',
                        'rgba(59, 130, 246, 0.6)'
                    ],
                    borderColor: [
                        'rgb(239, 68, 68)',
                        'rgb(16, 185, 129)',
                        'rgb(59, 130, 246)'
                    ],
                    borderWidth: 2,
                    borderRadius: 8
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        title: { display: true, text: '평균 반응속도 (1/t)' }
                    }
                }
            }
        });
    }

    // Detailed Report Inspector Modal for Teachers
    function showStudentDetailModal(userId) {
        const submissions = window.appState.allSubmissions || [];
        const studentData = submissions.find(s => s.userId === userId);
        if (!studentData) return;

        const info = studentData.studentInfo || {};
        const hyp = studentData.hypothesis || {};
        const design = studentData.design || { tubes: { tubeA: {}, tubeB: {}, tubeC: {} } };
        const results = studentData.results || {};
        const analysis = studentData.analysis || {};
        const con = studentData.conclusion || {};

        const detailHTML = `
            <div class="space-y-4 text-left text-xs">
                <div class="border-b border-slate-100 pb-3">
                    <h4 class="text-md font-bold text-slate-800">${info.grade}학년 ${info.classNum}반 ${info.studentNum}번 ${info.name}</h4>
                    <p class="text-[10px] text-slate-400 mt-1">업데이트 시각: ${studentData.updatedAt ? new Date(studentData.updatedAt).toLocaleString() : '미기록'}</p>
                </div>

                <div class="space-y-3 max-h-[350px] overflow-y-auto pr-2">
                    <div class="p-3 bg-slate-50 rounded-xl space-y-1">
                        <span class="block text-[10px] font-bold text-indigo-500 uppercase">수립한 탐구 가설</span>
                        <p class="font-bold text-slate-700">"효소는 ${getKoreanCond(hyp.condition)}에서 반응속도가 ${getKoreanRes(hyp.result)}"</p>
                    </div>

                    <div class="p-3 bg-slate-50 rounded-xl space-y-1">
                        <span class="block text-[10px] font-bold text-indigo-500">독립/종속/통제변인 설계 성취도</span>
                        <p class="font-semibold text-slate-700">조작(독립)변인: ${design.independent === 'ph' ? '✅ pH 정상매칭' : '❌ 오류'}</p>
                        <p class="font-semibold text-slate-700">측정(종속)변인: ${design.dependent === 'float-time' ? '✅ 상승시간 정상매칭' : '❌ 오류'}</p>
                        <p class="font-semibold text-slate-700">통제변인 수: ${design.controlled ? design.controlled.length : 0}개 통제 적용</p>
                    </div>

                    <div class="p-3 bg-slate-50 rounded-xl space-y-1">
                        <span class="block text-[10px] font-bold text-indigo-500">실측 수치 분석 (pH 및 소요시간)</span>
                        <p class="text-red-600 font-semibold">A(산성): 실측 pH ${design.tubes?.tubeA?.ph || '-'} | 시간 ${results.tubeA || '-'}초 | 속도 ${(results.tubeA > 0 ? (1/results.tubeA).toFixed(3) : '-')}</p>
                        <p class="text-emerald-600 font-semibold">B(중성): 실측 pH ${design.tubes?.tubeB?.ph || '-'} | 시간 ${results.tubeB || '-'}초 | 속도 ${(results.tubeB > 0 ? (1/results.tubeB).toFixed(3) : '-')}</p>
                        <p class="text-blue-600 font-semibold">C(염기성): 실측 pH ${design.tubes?.tubeC?.ph || '-'} | 시간 ${results.tubeC || '-'}초 | 속도 ${(results.tubeC > 0 ? (1/results.tubeC).toFixed(3) : '-')}</p>
                    </div>

                    <div class="p-3 bg-slate-50 rounded-xl space-y-1">
                        <span class="block text-[10px] font-bold text-indigo-500">결과 해석 및 결론 도출 결과</span>
                        <p class="font-semibold text-slate-700">속도 최고점 예측 일치도: ${analysis.fastest === 'tubeB' ? '정답 (중성 최대)' : '오류'}</p>
                        <p class="font-semibold text-slate-700">과학적 변성 이해도: ${analysis.reason === 'neutral-active' ? '정상 이해' : '오개념 존재'}</p>
                        <p class="font-semibold text-slate-700">가설 검증 진위 여부: ${con.matches === 'yes' ? '합치 판정' : '불일치 판정'}</p>
                        <p class="font-semibold text-slate-700">최종 요약 선택: ${con.summary === 'best-neutral' ? '합격(효소 pH 최적활성 진술 완료)' : '오진술'}</p>
                    </div>
                </div>
            </div>
        `;

        showModal(
            "📝 학생 개별 탐구 성과 검토",
            detailHTML,
            () => { console.log('Close detailed inspector'); }
        );
    }
</script>
