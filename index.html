<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>생명과학 실험 활동지 - 카탈레이스 반응 속도</title>
    <!-- Tailwind CSS (UI 디자인용) -->
    <script defer src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome (아이콘용) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Chart.js (그래프 시각화용) -->
    <script defer src="https://cdn.jsdelivr.net/npm/chart.js" onerror="window.__chartLoadFailed = true;"></script>
    <style>
        .step-active { background-color: #10B981; color: white; }
        .variable-card { cursor: pointer; transition: all 0.2s; }
        .variable-card:hover { transform: translateY(-2px); }

        /* Tailwind CDN이 차단돼도 첫 화면이 보이도록 하는 최소 안전 스타일 */
        body { margin: 0; background: #f8fafc; color: #1e293b; font-family: Arial, "Noto Sans KR", sans-serif; }
        #main-card { background: white; min-height: 450px; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans antialiased text-slate-800 pb-12">

    <div class="max-w-5xl mx-auto px-4 pt-6">
        <!-- 상단 헤더 -->
        <header class="bg-white rounded-2xl p-6 shadow-sm border border-slate-100 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6">
            <div class="flex items-center gap-4">
                <div class="bg-indigo-50 p-3 rounded-xl text-indigo-600 text-2xl">
                    <i class="fa-solid fa-flask-vial"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-bold tracking-tight text-slate-900">🔬 카탈레이스 효소 반응 속도 탐구</h1>
                    <p class="text-sm text-slate-500 mt-0.5">실제 탐구 기록 및 과학적 결과 그래프 시각화 활동지</p>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="clearAllDataAndReset()" class="bg-slate-100 text-slate-600 px-3 py-2.5 rounded-xl font-semibold text-xs hover:bg-slate-200 transition">
                    <i class="fa-solid fa-rotate-left"></i> 활동지 초기화
                </button>
                <button onclick="toggleDashboard()" id="dashBtn" class="bg-slate-900 text-white px-4 py-2.5 rounded-xl font-medium text-xs sm:text-sm hover:bg-slate-800 transition shadow-sm flex items-center gap-2">
                    <i class="fa-solid fa-chalkboard-user"></i> 교사 대시보드
                </button>
            </div>
        </header>

        <!-- 인디케이터 (단계 표시 바) -->
        <nav class="bg-white rounded-2xl p-4 shadow-sm border border-slate-100 mb-6 overflow-x-auto">
            <div class="flex justify-between items-center min-w-[600px] px-4">
                <div class="flex items-center gap-2 step-indicator" id="ind-1"><span class="w-8 h-8 rounded-full flex items-center justify-center font-bold step-active">1</span> <span class="text-sm font-semibold">시작하기</span></div>
                <div class="h-px bg-slate-200 flex-1 mx-4"></div>
                <div class="flex items-center gap-2 step-indicator" id="ind-2"><span class="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center font-bold text-slate-400">2</span> <span class="text-sm font-medium text-slate-400">가설 설정</span></div>
                <div class="h-px bg-slate-200 flex-1 mx-4"></div>
                <div class="flex items-center gap-2 step-indicator" id="ind-3"><span class="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center font-bold text-slate-400">3</span> <span class="text-sm font-medium text-slate-400">실험 설계</span></div>
                <div class="h-px bg-slate-200 flex-1 mx-4"></div>
                <div class="flex items-center gap-2 step-indicator" id="ind-4"><span class="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center font-bold text-slate-400">4</span> <span class="text-sm font-medium text-slate-400">결과 기록</span></div>
                <div class="h-px bg-slate-200 flex-1 mx-4"></div>
                <div class="flex items-center gap-2 step-indicator" id="ind-5"><span class="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center font-bold text-slate-400">5</span> <span class="text-sm font-medium text-slate-400">속도 해석</span></div>
                <div class="h-px bg-slate-200 flex-1 mx-4"></div>
                <div class="flex items-center gap-2 step-indicator" id="ind-6"><span class="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center font-bold text-slate-400">6</span> <span class="text-sm font-medium text-slate-400">결론 & 제출</span></div>
            </div>
        </nav>

        <!-- 메인 콘텐츠 영역 -->
        <main id="main-card" class="bg-white rounded-3xl p-8 shadow-sm border border-slate-100 min-h-[450px] flex flex-col justify-between">
            <div class="text-center py-12">
                <i class="fa-solid fa-spinner animate-spin text-4xl text-indigo-500 mb-4"></i>
                <p class="text-slate-500 font-medium">실험 활동지를 로드하고 있습니다...</p>
            </div>
        </main>
    </div>

    <!-- 교사 대시보드 모달 -->
    <div id="dashModal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl w-full max-w-4xl max-h-[85vh] overflow-y-auto p-8 shadow-xl border border-slate-100">
            <div class="flex justify-between items-center mb-6 border-b pb-4">
                <h2 class="text-xl font-bold flex items-center gap-2"><i class="fa-solid fa-chart-pie text-emerald-500"></i> 실시간 교사 모니터링 허브</h2>
                <button onclick="toggleDashboard()" class="text-slate-400 hover:text-slate-600 text-lg"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div id="authZone" class="py-12 text-center">
                <p class="text-slate-600 mb-4 font-medium">교사용 비밀번호를 입력하세요.</p>
                <div class="flex justify-center gap-2 max-w-xs mx-auto">
                    <input type="password" id="dashPw" class="border rounded-xl px-4 py-2 w-full focus:outline-emerald-500" placeholder="비밀번호">
                    <button onclick="checkPw()" class="bg-emerald-500 text-white px-4 py-2 rounded-xl font-medium hover:bg-emerald-600 transition">확인</button>
                </div>
                <p class="text-xs text-slate-400 mt-2">안내: 교사용 초기 비밀번호는 <code class="bg-slate-100 px-1 py-0.5 rounded font-bold">science</code> 입니다.</p>
            </div>
            <div id="dashContent" class="hidden space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="bg-slate-50 p-4 rounded-2xl border text-center">
                        <p class="text-xs text-slate-500 font-bold uppercase tracking-wider">총 참여 학생</p>
                        <p class="text-3xl font-bold mt-1 text-slate-900" id="stat-total">0명</p>
                    </div>
                    <div class="bg-emerald-50 p-4 rounded-2xl border border-emerald-100 text-center">
                        <p class="text-xs text-emerald-600 font-bold uppercase tracking-wider">최종 제출 완료</p>
                        <p class="text-3xl font-bold mt-1 text-emerald-700" id="stat-submit">0명</p>
                    </div>
                    <div class="bg-amber-50 p-4 rounded-2xl border border-amber-100 text-center">
                        <p class="text-xs text-amber-600 font-bold uppercase tracking-wider">실험 설계 통과율</p>
                        <p class="text-3xl font-bold mt-1 text-amber-700">100%</p>
                    </div>
                </div>
                <div>
                    <h3 class="font-bold text-slate-800 mb-3"><i class="fa-solid fa-list-check mr-1 text-slate-500"></i> 학생별 탐구 진행 현황</h3>
                    <div class="overflow-x-auto border rounded-2xl bg-white">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-slate-50 border-b text-slate-600 text-xs font-bold uppercase">
                                    <th class="p-4">학번/이름</th>
                                    <th class="p-4">현재 단계</th>
                                    <th class="p-4">설정 pH값 (A / B / C)</th>
                                    <th class="p-4">제출 여부</th>
                                </tr>
                            </thead>
                            <tbody id="dashTableBody" class="text-sm divide-y">
                                <!-- 학생 데이터 행 -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // GitHub Pages/CDN/브라우저 저장 데이터 문제에도 화면이 멈추지 않도록 하는 안전 장치
        function escapeHtml(value) {
            return String(value ?? '')
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#039;');
        }

        function normalizeStudentData(raw) {
            const base = getInitialState();
            if (!raw || typeof raw !== 'object') return base;

            const step = Number(raw.currentStep);
            base.name = typeof raw.name === 'string' ? raw.name : '';
            base.currentStep = Number.isInteger(step) && step >= 1 && step <= 6 ? step : 1;
            base.hypothesis = typeof raw.hypothesis === 'string' ? raw.hypothesis : '';
            base.conclusion = typeof raw.conclusion === 'string' ? raw.conclusion : '';
            base.isSubmitted = raw.isSubmitted === true;

            if (raw.variables && typeof raw.variables === 'object') {
                base.variables.independent = typeof raw.variables.independent === 'string' ? raw.variables.independent : '';
                base.variables.dependent = typeof raw.variables.dependent === 'string' ? raw.variables.dependent : '';
                base.variables.controlled = Array.isArray(raw.variables.controlled) ? raw.variables.controlled : [];
            }

            ['a', 'b', 'c'].forEach(key => {
                const item = raw.expData && raw.expData[key] ? raw.expData[key] : {};
                base.expData[key] = {
                    ph: item.ph === '' || item.ph == null ? '' : Number(item.ph),
                    time: item.time === '' || item.time == null ? '' : Number(item.time)
                };
                if (!Number.isFinite(base.expData[key].ph)) base.expData[key].ph = '';
                if (!Number.isFinite(base.expData[key].time)) base.expData[key].time = '';
            });

            return base;
        }

        function showFatalError(error) {
            console.error('앱 초기화 오류:', error);
            const main = document.getElementById('main-card');
            if (!main) return;
            main.innerHTML = `
                <div style="padding:32px;text-align:center">
                    <h2 style="font-size:20px;font-weight:700;margin-bottom:10px">화면을 불러오지 못했습니다.</h2>
                    <p style="font-size:14px;color:#64748b;margin-bottom:18px">브라우저의 이전 저장 데이터나 외부 라이브러리 로딩 문제일 수 있습니다.</p>
                    <button onclick="clearAllDataAndReset()" style="border:0;border-radius:10px;padding:11px 16px;background:#f59e0b;color:white;font-weight:700;cursor:pointer">저장 데이터 비우고 다시 시작</button>
                </div>`;
        }

        // 무결성 기준 기본 상태 정의
        function getInitialState() {
            return {
                name: '', 
                currentStep: 1,
                hypothesis: '',
                variables: { independent: '', dependent: '', controlled: [] },
                expData: {
                    a: { ph: '', time: '' },
                    b: { ph: '', time: '' },
                    c: { ph: '', time: '' }
                },
                conclusion: '', 
                isSubmitted: false
            };
        }

        let studentData = getInitialState();
        const totalSteps = 6;
        let myChart = null;

        // 변인 선택지 풀
        const variableOptions = [
            { id: 'v1', text: '용액의 pH (산성, 중성, 염기성)', type: 'ind' },
            { id: 'v2', text: '거름종이가 수면으로 떠오르는 시간', type: 'dep' },
            { id: 'v3', text: '카탈레이스(감자즙)의 농도 및 양', type: 'con' },
            { id: 'v4', text: '과산화수소수의 부피 및 농도', type: 'con' },
            { id: 'v5', text: '실험 장소의 전체 온도', type: 'con' }
        ];
        let selectedVariableIds = { independent: null, dependent: null, controlled: [] };

        // 안전한 페이지 초기 구동 (GitHub Pages에서도 반드시 한 번 실행)
        function initApp() {
            try {
                const saved = localStorage.getItem('enzyme_student_data');
                studentData = saved ? normalizeStudentData(JSON.parse(saved)) : getInitialState();
                localStorage.setItem('enzyme_student_data', JSON.stringify(studentData));
                renderStep();
            } catch(e) {
                studentData = getInitialState();
                try {
                    localStorage.removeItem('enzyme_student_data');
                } catch (_) {}
                showFatalError(e);
            }
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initApp, { once: true });
        } else {
            initApp();
        }

        // 수동 초기화 버튼 (오류 자가 치료용)
        function clearAllDataAndReset() {
            if(confirm("모든 활동 기록을 다 지우고 1단계로 새로 시작하시겠습니까?")) {
                localStorage.removeItem('enzyme_student_data');
                studentData = getInitialState();
                selectedVariableIds = { independent: null, dependent: null, controlled: [] };
                renderStep();
            }
        }

        function saveData() {
            try {
                localStorage.setItem('enzyme_student_data', JSON.stringify(studentData));
            } catch(e) {
                console.error("데이터 로컬 저장 실패", e);
            }
        }

        function updateIndicators() {
            for(let i=1; i<=totalSteps; i++) {
                const ind = document.getElementById(`ind-${i}`);
                if(!ind) continue;
                const circle = ind.querySelector('span:first-child');
                const text = ind.querySelector('span:last-child');
                if(i === studentData.currentStep) {
                    circle.className = "w-8 h-8 rounded-full flex items-center justify-center font-bold step-active";
                    text.className = "text-sm font-semibold text-slate-800";
                } else if(i < studentData.currentStep) {
                    circle.className = "w-8 h-8 rounded-full bg-emerald-100 text-emerald-600 flex items-center justify-center font-bold";
                    text.className = "text-sm font-medium text-slate-600";
                } else {
                    circle.className = "w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center font-bold text-slate-400";
                    text.className = "text-sm font-medium text-slate-400";
                }
            }
        }

        function nextStep() {
            if(studentData.currentStep < totalSteps) {
                studentData.currentStep++;
                saveData();
                renderStep();
            }
        }

        function prevStep() {
            if(studentData.currentStep > 1) {
                studentData.currentStep--;
                saveData();
                renderStep();
            }
        }

        function renderStep() {
            try {
                updateIndicators();
                const main = document.getElementById('main-card');
                if(!main) return;
                
                let html = `<div class="flex-1">`;
                
                switch(studentData.currentStep) {
                    case 1:
                        html += `
                            <div class="max-w-xl mx-auto text-center py-8">
                                <span class="bg-indigo-50 text-indigo-700 text-xs font-bold px-3 py-1 rounded-full uppercase tracking-wider">실험실 안전 및 인적사항</span>
                                <h2 class="text-2xl font-bold text-slate-900 mt-3 mb-2">실험 활동지 시작하기</h2>
                                <p class="text-slate-500 text-sm mb-8">모둠원 대표의 학번과 이름을 입력하고 탐구를 시작해 주세요.</p>
                                <div class="text-left bg-slate-50 p-6 rounded-2xl border border-slate-200/60 mb-6">
                                    <label class="block text-xs font-bold text-slate-600 uppercase mb-2">학번과 이름 입력</label>
                                    <input type="text" id="stuName" value="${escapeHtml(studentData.name || '')}" class="w-full bg-white border border-slate-300 rounded-xl px-4 py-3 text-base focus:outline-none focus:border-indigo-500 font-medium placeholder-slate-400 shadow-sm" placeholder="예) 20101 홍길동">
                                </div>
                            </div>
                        </div>
                        <div class="flex justify-end pt-6 border-t mt-6">
                            <button onclick="saveStep1()" class="bg-emerald-500 text-white px-6 py-3 rounded-xl font-semibold text-sm hover:bg-emerald-600 transition flex items-center gap-2 shadow-sm">다음 단계로 <i class="fa-solid fa-arrow-right"></i></button>
                        </div>`;
                        main.innerHTML = html;
                        break;

                    case 2:
                        html += `
                            <div class="mb-4">
                                <h2 class="text-xl font-bold text-slate-900 flex items-center gap-2"><i class="fa-solid fa-lightbulb text-amber-500"></i> [1단계] 탐구 가설 설정하기</h2>
                                <p class="text-sm text-slate-500 mt-1">실험을 통해 확인하고 싶은 핵심 가설을 문장으로 완성해 봅시다.</p>
                            </div>
                            <div class="bg-amber-50/50 border border-amber-200/70 rounded-2xl p-5 my-6">
                                <h3 class="text-sm font-bold text-amber-800 flex items-center gap-1.5 mb-2"><i class="fa-solid fa-circle-info"></i> 가설 작성 팁</h3>
                                <p class="text-xs text-amber-700 leading-relaxed">독립변인(pH 환경 변화)과 종속변인(카탈레이스의 효소 반응 속도)이 뚜렷하게 드러나도록 빈칸을 터치하여 알맞은 단어를 선택해 주세요.</p>
                            </div>
                            <div class="bg-slate-50 p-6 rounded-2xl border text-center text-base md:text-lg font-medium py-10 text-slate-700">
                                " 용액의 <span class="font-bold text-indigo-600">pH(산성/중성/염기성) 환경</span>이 변하면, 카탈레이스 효소의 반응 속도(거름종이가 떠오르는 속도)는 
                                <select id="hypoSelect" class="bg-white border-2 border-indigo-500 rounded-lg px-2 py-1 mx-1 text-slate-900 font-bold focus:outline-none">
                                    <option value="" ${studentData.hypothesis===''? 'selected':''}>-- 선택 --</option>
                                    <option value="변할 것이다" ${studentData.hypothesis==='변할 것이다'? 'selected':''}>변할 것이다 (영향이 있을 것이다)</option>
                                    <option value="일정할 것이다" ${studentData.hypothesis==='일정할 것이다'? 'selected':''}>일정할 것이다 (영향이 없을 것이다)</option>
                                </select> 
                                ."
                            </div>
                        </div>
                        <div class="flex justify-between pt-6 border-t mt-6">
                            <button onclick="prevStep()" class="bg-slate-100 text-slate-600 px-5 py-2.5 rounded-xl font-semibold text-sm hover:bg-slate-200 transition"><i class="fa-solid fa-arrow-left mr-1"></i> 이전</button>
                            <button onclick="saveStep2()" class="bg-emerald-500 text-white px-6 py-3 rounded-xl font-semibold text-sm hover:bg-emerald-600 transition flex items-center gap-2">다음 단계로 <i class="fa-solid fa-arrow-right"></i></button>
                        </div>`;
                        main.innerHTML = html;
                        break;

                    case 3:
                        html += `
                            <div class="mb-4">
                                <h2 class="text-xl font-bold text-slate-900 flex items-center gap-2"><i class="fa-solid fa-gears text-indigo-500"></i> [2단계] 변인 설정 및 실험 설계</h2>
                                <p class="text-sm text-slate-500 mt-1">준비된 요소를 알맞은 변인 칸에 **터치하여** 넣어주세요. 조건이 완성되면 아래에 맞춤형 실험 과정 가이드가 생성됩니다.</p>
                            </div>
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 my-6">
                                <div class="md:col-span-1 bg-slate-50 p-4 rounded-2xl border border-dashed border-slate-300">
                                    <h3 class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">설정 가능한 변인 카드</h3>
                                    <div class="space-y-2" id="poolZone"></div>
                                </div>
                                <div class="md:col-span-2 space-y-4">
                                    <div class="p-4 rounded-xl border flex items-center justify-between bg-white" id="slot-ind">
                                        <div>
                                            <h4 class="text-sm font-bold text-slate-900"><span class="inline-block w-2 h-2 rounded-full bg-blue-500 mr-1.5"></span>독립 변인 (조작 변인)</h4>
                                            <p class="text-xs text-slate-400 mt-0.5">우리가 의도적으로 변화시키는 조건</p>
                                        </div>
                                        <div class="text-sm font-semibold text-blue-600 bg-blue-50 px-3 py-1.5 rounded-xl border border-blue-100" id="slot-ind-text">선택 대기 중</div>
                                    </div>
                                    <div class="p-4 rounded-xl border flex items-center justify-between bg-white" id="slot-dep">
                                        <div>
                                            <h4 class="text-sm font-bold text-slate-900"><span class="inline-block w-2 h-2 rounded-full bg-red-500 mr-1.5"></span>종속 변인 (결과 측정)</h4>

            const item = variableOptions.find(v => v.id === id);

                selectedVariableIds.independent = id;

                { x: studentData.expData.a.ph, y: parseFloat(rateA) },
                { x: studentData.expData.b.ph, y: parseFloat(rateB) },
                { x: studentData.expData.c.ph, y: parseFloat(rateC) }
            ].sort((a,b) => a.x - b.x);

            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    datasets: [{
                        label: '효소 반응 속도 (1/t)',
                        data: dataPoints,
                        backgroundColor: '#6366F1',
                        borderColor: '#6366F1',
                        borderWidth: 2,
                        pointRadius: 6,
                        pointHoverRadius: 8,
                        tension: 0.2
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        x: { type: 'linear', title: { display: true, text: '실측 pH', font: { weight: 'bold' } }, min: 0, max: 14 },
                        y: { title: { display: true, text: '반응 속도 (1/시간)', font: { weight: 'bold' } }, beginAtZero: true }
                    }
                }
            });
        }

        function submitFinal() {
            const area = document.getElementById('conclusionText');
            const txt = area ? area.value.trim() : "";
            if(!txt) { alert('최종 결론 분석을 한 문장이라도 작성해 주세요.'); return; }
            studentData.conclusion = txt;
            studentData.isSubmitted = true;
            saveData();
            alert('🎉 데이터가 성공적으로 서버에 기록되었습니다! 수고하셨습니다.');
            studentData.currentStep = 1;
            saveData();
            renderStep();
        }

        let timerInterval = null;
        let startTime = 0;
        let elapsed = 0;
        function toggleStopwatch() {
            const btn = document.getElementById('sw-btn');
            if(!timerInterval) {
                startTime = Date.now() - elapsed;
                timerInterval = setInterval(() => {
                    elapsed = Date.now() - startTime;
                    const min = String(Math.floor(elapsed / 60000)).padStart(2, '0');
                    const sec = String(Math.floor((elapsed % 60000) / 1000)).padStart(2, '0');
                    const ms = String(Math.floor((elapsed % 1000) / 100)).padStart(1, '0');
                    const display = document.getElementById('stopwatch-display');
                    if(display) display.innerText = `${min}:${sec}.${ms}`;
                }, 100);
                if(btn) {
                    btn.innerText = '정지';
                    btn.className = 'bg-red-500 text-white px-3 py-1 rounded-lg font-medium hover:bg-red-600';
                }
            } else {
                clearInterval(timerInterval);
                timerInterval = null;
                if(btn) {
                    btn.innerText = '시작';
                    btn.className = 'bg-indigo-600 text-white px-3 py-1 rounded-lg font-medium hover:bg-indigo-700';
                }
            }
        }
        function resetStopwatch() {
            clearInterval(timerInterval);
            timerInterval = null;
            elapsed = 0;
            const display = document.getElementById('stopwatch-display');
            if(display) display.innerText = '00:00.0';
            const btn = document.getElementById('sw-btn');
            if(btn) {
                btn.innerText = '시작';
                btn.className = 'bg-indigo-600 text-white px-3 py-1 rounded-lg font-medium hover:bg-indigo-700';
            }
        }

        function toggleDashboard() {
            const modal = document.getElementById('dashModal');
            if(!modal) return;
            modal.classList.toggle('hidden');
            if(!modal.classList.contains('hidden')) {
                document.getElementById('authZone').classList.remove('hidden');
                document.getElementById('dashContent').classList.add('hidden');
                const pwInput = document.getElementById('dashPw');
                if(pwInput) pwInput.value = '';
            }
        }

        function checkPw() {
            const pwInput = document.getElementById('dashPw');
            const pw = pwInput ? pwInput.value : '';
            if(pw === 'science') {
                const auth = document.getElementById('authZone');
                const content = document.getElementById('dashContent');
                if(auth) auth.classList.add('hidden');
                if(content) content.classList.remove('hidden');
                buildDashboardData();
            } else {
                alert('비밀번호가 일치하지 않습니다.');
            }
        }

        function buildDashboardData() {
            const tbody = document.getElementById('dashTableBody');
            const totalEl = document.getElementById('stat-total');
            const submitEl = document.getElementById('stat-submit');
            if(!tbody || !totalEl || !submitEl) return;

            const currentStudent = JSON.parse(localStorage.getItem('enzyme_student_data')) || studentData;
            
            totalEl.innerText = currentStudent.name ? "1명" : "0명";
            submitEl.innerText = currentStudent.isSubmitted ? "1명" : "0명";

            if(!currentStudent.name) {
                tbody.innerHTML = `<tr><td colspan="4" class="p-8 text-center text-slate-400 italic">현재 접속 활동 중인 디벗 학생이 없습니다.</td></tr>`;
                return;
            }

            const stepNames = ["인적사항 입력", "가설 설정 완료", "실험 설계 완료", "실험 결과 기록 중", "결과 그래프 분석 중", "결론 도출 및 제출 완료"];
            const curStepName = stepNames[currentStudent.currentStep - 1] || "종료";

            tbody.innerHTML = `
                <tr class="hover:bg-slate-50/80 transition">
                    <td class="p-4 font-semibold text-slate-800">${escapeHtml(currentStudent.name)}</td>
                    <td class="p-4"><span class="bg-indigo-50 text-indigo-700 text-xs font-semibold px-2 py-1 rounded-md border border-indigo-100">${curStepName}</span></td>
                    <td class="p-4 font-mono text-xs text-slate-600">A: ${currentStudent.expData.a.ph || '-'} / B: ${currentStudent.expData.b.ph || '-'} / C: ${currentStudent.expData.c.ph || '-'}</td>
                    <td class="p-4">${currentStudent.isSubmitted ? '<span class="text-emerald-600 font-bold text-xs"><i class="fa-solid fa-circle-check"></i> 완료됨</span>' : '<span class="text-amber-500 font-medium text-xs"><i class="fa-solid fa-spinner animate-spin"></i> 작성 중</span>'}</td>
                </tr>
            `;
        }
    </script>
</body>
</html>
