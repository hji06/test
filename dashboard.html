<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>카탈레이스 실험 교사 대시보드</title>
<style>
:root{--bg:#f4f7fb;--card:#fff;--text:#172033;--muted:#667085;--line:#dfe6ef;--primary:#0f766e;--soft:#e7f7f4;--green:#067647;--amber:#934b00;--shadow:0 10px 30px rgba(28,39,60,.08)}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:"Pretendard","Noto Sans KR",system-ui,sans-serif;line-height:1.5}
.app{width:min(1180px,calc(100% - 24px));margin:auto;padding:18px 0 40px}.card{background:var(--card);border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow)}
header{display:flex;justify-content:space-between;align-items:center;gap:14px;padding:20px 22px;margin-bottom:16px}h1{font-size:26px;margin:0}header p{margin:3px 0 0;color:var(--muted)}
.btn{border:0;border-radius:12px;padding:11px 15px;min-height:44px;font-weight:800;cursor:pointer}.primary{background:var(--primary);color:#fff}.soft{background:#f2f4f7;color:#344054;border:1px solid #e4e7ec}
.panel{padding:22px}.field{margin-bottom:14px}label{display:block;font-weight:800;margin-bottom:7px}.input{width:100%;max-width:430px;min-height:48px;border:1.5px solid #cfd8e5;border-radius:13px;padding:11px 13px;font-size:16px}
.notice{padding:14px 16px;border-radius:14px;margin-bottom:14px;background:#eef2ff;color:#3043a7;border:1px solid #d9e0ff}.bad{background:#fff0ee;color:#912018;border-color:#ffd2cc}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}.stat{padding:15px;border:1px solid var(--line);border-radius:15px;background:#f8fafc}.stat span{font-size:12px;color:var(--muted);font-weight:800}.stat strong{display:block;font-size:25px;margin-top:3px}
.toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin:12px 0}.toolbar .input{max-width:320px;min-height:42px}
.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:15px}table{width:100%;border-collapse:collapse;min-width:780px}th,td{padding:12px;border-bottom:1px solid var(--line);text-align:center}th{background:#f8fafc;font-size:13px;color:#475467}td:first-child,th:first-child{text-align:left}
.pill{display:inline-block;padding:5px 9px;border-radius:999px;font-size:12px;font-weight:900}.done{background:#d1fadf;color:#05603a}.work{background:#ffead5;color:#934b00}
.overlay{position:fixed;inset:0;background:rgba(16,24,40,.55);display:grid;place-items:center;padding:16px}.hidden{display:none}.modal{width:min(780px,100%);max-height:90vh;overflow:auto;background:#fff;border-radius:20px;padding:20px}.modal-head{display:flex;justify-content:space-between;align-items:center}.close{border:0;background:#f2f4f7;border-radius:50%;width:40px;height:40px;font-size:22px}.detail{white-space:pre-wrap;background:#f8fafc;border:1px solid var(--line);border-radius:13px;padding:13px;margin:8px 0 16px}.muted{color:var(--muted);font-size:13px}
@media(max-width:760px){header{align-items:flex-start;flex-direction:column}.stats{grid-template-columns:1fr 1fr}.panel{padding:15px}.toolbar .input{max-width:none}}
</style>
</head>
<body>
<div class="app">
<header class="card"><div><h1>👩‍🏫 카탈레이스 실험 교사 대시보드</h1><p>학생 진행률과 제출 내용을 확인합니다.</p></div><button class="btn soft" onclick="location.reload()">↻ 새로고침</button></header>
<main class="card panel"><div id="content"></div></main>
</div>
<div id="overlay" class="overlay hidden"><div class="modal"><div class="modal-head"><h2>학생 응답 상세</h2><button class="close" onclick="closeDetail()">×</button></div><div id="detail"></div></div></div>
<script>
'use strict';
const CONFIG={API_URL:'https://script.google.com/macros/s/AKfycbxL_AuuqF5JIVjAA-o_p9v0ntTLTV-5G8LcSAU2_SgmiDfH9srfe7WC1UN6QU-C5YYU/exec',REFRESH_MS:20000};
const STEP_NAMES=['시작','가설','실험 설계','결과 기록','해석·그래프','결론·제출'];
let rows=[],password='';
function safe(v){return String(v??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'","&#039;")}
function configured(){return /^https:\/\/script\.google\.com\/macros\/s\/.+\/exec$/.test(CONFIG.API_URL.trim())}
async function post(payload){const r=await fetch(CONFIG.API_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload),redirect:'follow'});const t=await r.text();let d;try{d=JSON.parse(t)}catch{throw new Error('서버 응답을 읽지 못했습니다. Apps Script 배포 설정을 확인하세요.')}if(!d.ok)throw new Error(d.message||'요청 실패');return d}
function login(){const c=document.getElementById('content');if(!configured()){c.innerHTML='<div class="notice bad"><b>서버 주소가 설정되지 않았습니다.</b><br>dashboard.html의 CONFIG.API_URL에 Apps Script /exec 주소를 입력하세요.</div>';return}c.innerHTML=`<div class="notice">학생용 링크와 분리된 교사용 화면입니다. Apps Script의 TEACHER_PASSWORD를 입력하세요.</div><div class="field"><label>교사용 비밀번호</label><input id="pw" class="input" type="password" placeholder="비밀번호" onkeydown="if(event.key==='Enter')load()"></div><button class="btn primary" onclick="load()">대시보드 열기</button>`}
async function load(){const p=document.getElementById('pw')?.value||password;if(!p)return alert('비밀번호를 입력하세요.');password=p;document.getElementById('content').innerHTML='<p>학생 데이터를 불러오는 중입니다…</p>';try{const d=await post({action:'list',password});rows=Array.isArray(d.rows)?d.rows:[];render();}catch(e){document.getElementById('content').innerHTML='<div class="notice bad"><b>불러오기 실패</b><br>'+safe(e.message)+'</div><button class="btn soft" onclick="login()">다시 입력</button>'}}
function render(q=''){const f=rows.filter(r=>!q||(`${r.className} ${r.studentNo} ${r.name}`).toLowerCase().includes(q.toLowerCase()));const submitted=rows.filter(r=>r.submitted).length;const active=rows.filter(r=>!r.submitted&&Number(r.currentStep)>1).length;const avg=rows.length?Math.round(rows.reduce((a,r)=>a+(Number(r.currentStep)||1),0)/rows.length/6*100):0;document.getElementById('content').innerHTML=`<div class="stats"><div class="stat"><span>참여 학생</span><strong>${rows.length}명</strong></div><div class="stat"><span>최종 제출</span><strong>${submitted}명</strong></div><div class="stat"><span>작성 중</span><strong>${active}명</strong></div><div class="stat"><span>평균 진행률</span><strong>${avg}%</strong></div></div><div class="toolbar"><input id="search" class="input" placeholder="반·번호·이름 검색" value="${safe(q)}" oninput="render(this.value)"><button class="btn soft" onclick="load()">↻ 새로고침</button><button class="btn soft" onclick="csv()">CSV 내려받기</button><span class="muted">20초마다 자동 갱신</span></div><div class="table-wrap"><table><thead><tr><th>학생</th><th>현재 단계</th><th>업데이트</th><th>제출</th><th>상세</th></tr></thead><tbody>${f.length?f.map(r=>`<tr><td><b>${safe(r.className)}반 ${safe(r.studentNo)}번</b><br><span class="muted">${safe(r.name)}</span></td><td>${safe(STEP_NAMES[(Number(r.currentStep)||1)-1]||'-')} (${Number(r.currentStep)||1}/6)</td><td>${fmt(r.updatedAt)}</td><td><span class="pill ${r.submitted?'done':'work'}">${r.submitted?'제출 완료':'작성 중'}</span></td><td><button class="btn soft" onclick="detailByKey('${safe(r.studentKey).replaceAll("'","\\'")}')">보기</button></td></tr>`).join(''):'<tr><td colspan="5">표시할 학생이 없습니다.</td></tr>'}</tbody></table></div>`}
function fmt(v){const d=new Date(v);return Number.isNaN(d.getTime())?'-':new Intl.DateTimeFormat('ko-KR',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}).format(d)}
function detailByKey(k){const r=rows.find(x=>x.studentKey===k);if(!r)return;const c=r.calculated||{};const result=['A','B','C'].map(g=>`${g} 조건: 실제 pH ${c[g]?.ph??'-'}, 시간 ${Number.isFinite(Number(c[g]?.meanTime))?Number(c[g].meanTime).toFixed(2):'-'} s, 반응 속도 ${Number.isFinite(Number(c[g]?.meanRate))?Number(c[g].meanRate).toFixed(4):'-'} s⁻¹`).join('\\n');document.getElementById('detail').innerHTML=`<h3>${safe(r.className)}반 ${safe(r.studentNo)}번 ${safe(r.name)}</h3><h3>가설</h3><div class="detail">${safe(r.hypothesis?.reason||'-')}</div><h3>측정 결과</h3><div class="detail">${safe(result)}</div><h3>해석</h3><div class="detail">근거: ${safe(r.analysis?.evidence||'-')}\\n\\n해석: ${safe(r.analysis?.explanation||'-')}\\n\\n한계: ${safe(r.analysis?.limitation||'-')}</div><h3>결론</h3><div class="detail">${safe(r.conclusion||'-')}</div>`;document.getElementById('overlay').classList.remove('hidden')}
function closeDetail(){document.getElementById('overlay').classList.add('hidden')}
function esc(v){const s=String(v??'');return /[",\n]/.test(s)?`"${s.replaceAll('"','""')}"`:s}
function csv(){if(!rows.length)return alert('내려받을 데이터가 없습니다.');const h=['반','번호','이름','현재단계','제출여부','업데이트','A실제pH','A시간','A속도','B실제pH','B시간','B속도','C실제pH','C시간','C속도','근거','해석','한계','결론'];const lines=[h,...rows.map(r=>[r.className,r.studentNo,r.name,r.currentStep,r.submitted?'제출':'작성중',r.updatedAt,r.calculated?.A?.ph,r.calculated?.A?.meanTime,r.calculated?.A?.meanRate,r.calculated?.B?.ph,r.calculated?.B?.meanTime,r.calculated?.B?.meanRate,r.calculated?.C?.ph,r.calculated?.C?.meanTime,r.calculated?.C?.meanRate,r.analysis?.evidence,r.analysis?.explanation,r.analysis?.limitation,r.conclusion])].map(x=>x.map(esc).join(','));const b=new Blob(['\ufeff'+lines.join('\n')],{type:'text/csv;charset=utf-8'});const u=URL.createObjectURL(b),a=document.createElement('a');a.href=u;a.download='카탈레이스_학생응답.csv';a.click();URL.revokeObjectURL(u)}
document.addEventListener('DOMContentLoaded',()=>{login();setInterval(()=>{if(password)load()},CONFIG.REFRESH_MS)});
</script>
</body></html>
